<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="EPL 프리미어리그 AI 승부예측 · xG·포아송·Elo 기반 · GW별 조합픽">
  <meta name="theme-color" content="#06090F">
  <meta property="og:title" content="PL Predict — EPL AI 승부예측">
  <meta property="og:description" content="xG·포아송·Elo·H2H 기반 프리미어리그 경기 AI 예측">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PL Predict — EPL AI 승부예측</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22PL+Predict%22,%22short_name%22:%22PLPredict%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%2306090F%22,%22theme_color%22:%22%2310B981%22}">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#06090F;--bg1:#0C1220;--bg2:#111D31;--bg3:#1C2B45;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.14);
  --t1:#F0F4FF;--t2:#8B9EC7;--t3:#4B5E80;
  --green:#10B981;--gb:rgba(16,185,129,.12);--gb2:rgba(16,185,129,.28);
  --red:#EF4444;--rb:rgba(239,68,68,.12);--rb2:rgba(239,68,68,.28);
  --amber:#F59E0B;--ab:rgba(245,158,11,.12);--ab2:rgba(245,158,11,.28);
  --blue:#4A90E2;--bb:rgba(74,144,226,.12);--bb2:rgba(74,144,226,.28);
  --purple:#8B5CF6;--gold:#FFD700;
  --r:10px;--rl:16px;
  --fh:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--t1);font-family:var(--fb);font-size:14px;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}

/* ── HEADER ── */
header{background:var(--bg1);border-bottom:1px solid var(--bdr);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:15px;font-weight:800;color:#fff}
.logo-text{font-family:var(--fh);font-size:19px;font-weight:800}
.logo-v{font-size:11px;color:var(--green);font-family:var(--fb);font-weight:500;margin-left:4px}
.logo-sub{font-size:10px;color:var(--t3);letter-spacing:.4px}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hdr-badge{background:var(--bg2);border:1px solid var(--bdr2);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--t2)}
.sync-btn{background:var(--bg2);border:1px solid var(--bdr2);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:5px}
.sync-btn:hover{border-color:var(--blue);color:var(--blue)}
.sync-ico{width:12px;height:12px}
.sync-ico.spin{animation:spin .8s linear infinite}
.st-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
.st-dot.err{background:var(--red);animation:none}
.st-dot.load{background:var(--amber);animation:spin .8s linear infinite;border-radius:0;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
.gw-filter-btn:hover:not(.on){color:var(--t1);border-color:var(--bdr2)}
.gw-separator::after{content:'';flex:1;height:0.5px;background:var(--bdr)}
/* AI픽 카드 */
.aipick-hero{background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(74,144,226,.12));border:1px solid rgba(139,92,246,.35);border-radius:var(--rl);padding:20px;margin-bottom:14px;text-align:center}
.aipick-title{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--purple);letter-spacing:.5px;margin-bottom:6px}
.aipick-pct{font-family:var(--fh);font-size:52px;font-weight:800;color:var(--t1);line-height:1}
.aipick-odds{font-size:20px;font-weight:600;color:var(--t2);margin-top:4px}
.aipick-meta{font-size:12px;color:var(--t3);margin-top:8px;line-height:1.6}
.aipick-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.aipick-option-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:12px;cursor:pointer;transition:border-color .15s}
.aipick-option-card:hover{border-color:var(--purple)}
.aipick-option-card.selected{border-color:var(--purple);background:rgba(139,92,246,.1)}
.aipick-option-title{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--t1);margin-bottom:2px}
.aipick-option-desc{font-size:11px;color:var(--t3)}
.aipick-option-pct{font-family:var(--fh);font-size:22px;font-weight:800;margin-top:6px}
.add-to-my-btn:hover{background:var(--purple);color:#fff}
/* ── 백테스트 스타일 ── */

/* ── TABS ── */
.tabs::-webkit-scrollbar{height:0}
.tab-btn:hover:not(.on){color:var(--t2)}

/* ── LAYOUT ── */

/* ── SIDEBAR HEAD ── */
.pill b{color:var(--t1)}

/* ── FIXTURE CARD ── */
.fc:hover{background:rgba(74,144,226,.05)}
.tform.r{justify-content:flex-end}
.combo-add-btn:hover{background:rgba(139,92,246,.25)}

/* ── ANALYSIS MAIN ── */
.htm.r{flex-direction:row-reverse;text-align:right}
.pc.wa{border-color:var(--rb2);background:var(--rb)}
.pc.wh .pcpct{color:var(--blue)}.pc.wa .pcpct{color:var(--red)}
.al-c .al-ico{background:var(--green);color:#fff}.al-r .al-ico{background:var(--red);color:#fff}.al-w .al-ico{background:var(--amber);color:#fff}
.al-c .al-ttl{color:var(--green)}.al-r .al-ttl{color:var(--red)}.al-w .al-ttl{color:var(--amber)}

/* ── H2H ── */
.h2h-match-row:last-child{border-bottom:none}

/* ── 내 예측 ── */

/* ── 조합 탭 ── */
.cmr-remove:hover{border-color:var(--red);color:var(--red)}
.save-combo-btn:hover{opacity:.85}

/* ── 내 기록 탭 ── */
.rec-del:hover{border-color:var(--red);color:var(--red)}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gb);border:1px solid var(--gb2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--green)}

/* ── 순위표 ── */

/* ── 백테스트 ── */
.bt-lbl{font-size:10px;color:var(--t3);margin-top:3px}
.bt-sub2{font-size:11px;color:var(--t2);margin-top:3px}
.bt-band-row:last-child{border-bottom:none}
.bt-calib-row:last-child{border-bottom:none}
.bt-week-row:last-child{border-bottom:none}
.bt-spinner .spin-icon{display:inline-block;font-size:28px;animation:spin .8s linear infinite;margin-bottom:10px}

/* ── 조합픽 탭 ── */
.aipick-pct-small{font-family:var(--fh);font-size:16px;font-weight:700;min-width:36px;text-align:right}

/* ── 반응형 768px ── */
@media(max-width:768px){
  .split{flex-direction:column;height:auto}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--bdr)}
  .main-area{overflow-y:visible}
  .tab-page{height:auto}
  .p3 .pcpct{font-size:22px}
  .rec-summary{grid-template-columns:1fr 1fr}
  .bt-grid4{grid-template-columns:1fr 1fr}
  .tabs{overflow-x:auto}
}

/* ── ANIMATIONS ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── TABS BAR ── */
.tabs{display:flex;gap:0;padding:0 20px;background:var(--bg1);border-bottom:1px solid var(--bdr);overflow-x:auto;height:46px;flex-shrink:0}
.tabs::-webkit-scrollbar{height:0}
.tab-btn{padding:0 14px;height:46px;font-size:12px;font-weight:600;color:var(--t3);background:none;border:none;cursor:pointer;font-family:var(--fb);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tab-btn.on{color:var(--t1);border-bottom-color:var(--blue)}
.tab-btn:hover:not(.on){color:var(--t2)}
.tab-badge{background:var(--red);color:#fff;font-size:9px;border-radius:8px;padding:1px 5px;font-family:var(--fb)}
.ai-pick-tab{background:linear-gradient(90deg,rgba(139,92,246,.12),rgba(74,144,226,.08))}
.ai-pick-tab.on{background:var(--purple) !important;color:#fff !important;border-bottom-color:var(--purple) !important}
.hdr-btn{background:var(--bg2);border:1px solid var(--bdr2);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--t2);cursor:pointer;font-family:var(--fb);transition:all .15s}
.hdr-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ── LAYOUT ── */
.tab-page{display:none}
.tab-page.on{display:flex;flex-direction:column;height:calc(100vh - 102px)}
.split{display:flex;flex:1;min-height:0;overflow:hidden}
.sidebar{width:340px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--bdr);overflow-y:auto;display:flex;flex-direction:column}
.main-area{flex:1;overflow-y:auto;background:var(--bg0)}

/* ── AI픽·조합·기록·순위 탭은 스크롤 직접 ── */
#tab-aipick.on,#tab-combo.on,#tab-record.on,#tab-standings.on,#tab-backtest.on{overflow-y:auto}

/* ── SIDEBAR ── */
.sb-head{padding:12px 16px 8px;border-bottom:1px solid var(--bdr);background:var(--bg1);flex-shrink:0}
.sb-gw{font-family:var(--fh);font-size:20px;font-weight:800}
.sb-sub{font-size:10px;color:var(--t3);margin-top:1px}
.pills{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.pill{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:3px 9px;font-size:10px;color:var(--t2)}
.pill b{color:var(--t1)}
.combo-hint{background:var(--bb);border:1px solid var(--bb2);border-radius:var(--r);padding:7px 12px;margin:8px 16px 0;font-size:11px;color:var(--blue);display:flex;align-items:center;gap:6px;flex-shrink:0}
.combo-count{background:var(--blue);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;font-family:var(--fh)}
#fixture-list{flex:1;overflow-y:auto}

/* ── GW FILTER ── */
.gw-filter-btn{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;color:var(--t2);cursor:pointer;font-family:var(--fb);transition:all .15s}
.gw-filter-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.gw-filter-btn:hover:not(.on){color:var(--t1);border-color:var(--bdr2)}
.gw-separator{padding:8px 16px 4px;font-size:10px;font-weight:700;color:var(--t3);display:flex;align-items:center;gap:8px;letter-spacing:.5px}
.gw-separator::after{content:'';flex:1;height:.5px;background:var(--bdr)}
.gw-future-note{font-size:9px;color:var(--t3);background:var(--ab);border:1px solid var(--ab2);border-radius:8px;padding:1px 7px}

/* ── FIXTURE CARD ── */
.fc{padding:11px 16px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .12s;position:relative;animation:fadeIn .2s ease}
.fc:hover{background:rgba(74,144,226,.05)}
.fc.on{background:rgba(74,144,226,.09);border-left:3px solid var(--blue)}
.fc.in-combo{background:rgba(139,92,246,.08);border-left:3px solid var(--purple)}
.fc-top{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.tc{flex:1;min-width:0}
.tbadge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:9px;font-weight:800;color:#fff;border:1.5px solid rgba(255,255,255,.15);flex-shrink:0}
.tname{font-size:12px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tmeta{font-size:10px;color:var(--t3);margin-top:1px}
.tform{display:flex;gap:2px;margin-top:3px}.tform.r{justify-content:flex-end}
.fd{width:13px;height:13px;border-radius:50%;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fw{background:#10B981;color:#064E3B}.fdr{background:#F59E0B;color:#451A03}.fl{background:#EF4444;color:#450A0A}
.vc{text-align:center;min-width:68px;flex-shrink:0}
.vtime{font-size:9px;color:var(--t3);margin-bottom:2px}
.pbar{display:flex;height:4px;border-radius:2px;overflow:hidden;gap:1px}
.pbh{background:var(--blue)}.pbd{background:#2d3f5a}.pba{background:var(--red)}
.pns{display:flex;justify-content:space-between;font-size:9px;margin-top:2px}
.badgerow{display:flex;justify-content:space-between;align-items:center;margin-top:5px;flex-wrap:wrap;gap:4px}
.b-cert{background:var(--gb);border:1px solid var(--gb2);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--green);display:inline-flex;align-items:center;gap:3px}
.b-risk{background:var(--rb);border:1px solid var(--rb2);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--red);display:inline-flex;align-items:center;gap:3px}
.b-warn{background:var(--ab);border:1px solid var(--ab2);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--amber);display:inline-flex;align-items:center;gap:3px}
.combo-add-btn{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);border-radius:20px;padding:2px 9px;font-size:9px;font-weight:700;color:var(--purple);cursor:pointer;font-family:var(--fh);transition:all .15s;flex-shrink:0}
.combo-add-btn:hover{background:rgba(139,92,246,.25)}
.combo-add-btn.added{background:var(--purple);color:#fff;border-color:var(--purple)}

/* ── 경기 분석 패널 ── */
.aw{padding:18px;max-width:860px}
.empty-s{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:300px;color:var(--t3);gap:10px}
.mhero{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rl);padding:18px;margin-bottom:12px}
.ht{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.htm{flex:1;display:flex;align-items:center;gap:10px}.htm.r{flex-direction:row-reverse;text-align:right}
.hbadge{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:13px;font-weight:800;color:#fff;border:2.5px solid rgba(255,255,255,.16);flex-shrink:0}
.hname{font-family:var(--fh);font-size:20px;font-weight:800}
.hmeta{font-size:11px;color:var(--t3);margin-top:1px}
.hvs{background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;padding:8px 12px;text-align:center;min-width:80px}
.hvstxt{font-family:var(--fh);font-size:24px;font-weight:800;color:var(--t3)}
.p3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.pc{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:11px;text-align:center}
.pc.wh{border-color:var(--bb2);background:var(--bb)}.pc.wa{border-color:var(--rb2);background:var(--rb)}
.pclbl{font-size:10px;color:var(--t3);margin-bottom:3px}
.pcpct{font-family:var(--fh);font-size:28px;font-weight:800;line-height:1}
.pcodds{font-size:10px;color:var(--t3);margin-top:3px}
.pc.wh .pcpct{color:var(--blue)}.pc.wa .pcpct{color:var(--red)}
.al-c,.al-r,.al-w{border-radius:var(--r);padding:12px 14px;margin-bottom:10px;display:flex;gap:10px}
.al-c{background:var(--gb);border:1px solid var(--gb2)}
.al-r{background:var(--rb);border:1px solid var(--rb2)}
.al-w{background:var(--ab);border:1px solid var(--ab2)}
.al-ico{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:13px;font-weight:800;flex-shrink:0;color:#fff}
.al-c .al-ico{background:var(--green)}.al-r .al-ico{background:var(--red)}.al-w .al-ico{background:var(--amber)}
.al-ttl{font-size:12px;font-weight:700;margin-bottom:2px}
.al-c .al-ttl{color:var(--green)}.al-r .al-ttl{color:var(--red)}.al-w .al-ttl{color:var(--amber)}
.al-msg{font-size:11px;color:var(--t2);line-height:1.6}
.sc{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.sch{padding:10px 14px;border-bottom:1px solid var(--bdr);font-family:var(--fh);font-size:14px;font-weight:700;color:var(--t1);display:flex;align-items:center;justify-content:space-between}
.schn{font-size:10px;color:var(--t3);font-family:var(--fb);font-weight:400}
.scb{padding:12px 14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.gc{background:var(--bg3);border-radius:var(--r);padding:10px;text-align:center}
.gv{font-family:var(--fh);font-size:22px;font-weight:700}.gl{font-size:10px;color:var(--t3);margin-top:2px}

/* ── H2H ── */
.h2h-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.h2h-stat{background:var(--bg3);border-radius:var(--r);padding:10px;text-align:center}
.h2h-val{font-family:var(--fh);font-size:22px;font-weight:800}
.h2h-lbl{font-size:10px;color:var(--t3);margin-top:2px}
.h2h-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.h2h-bar-lbl{font-size:11px;color:var(--t2);width:80px;flex-shrink:0}
.h2h-bar-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.h2h-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.h2h-bar-val{font-size:11px;font-weight:600;min-width:36px;text-align:right}
.h2h-match-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.h2h-match-row:last-child{border-bottom:none}
.h2h-date{color:var(--t3);width:60px;flex-shrink:0;font-size:10px}
.h2h-home{flex:1;text-align:right}
.h2h-score{background:var(--bg3);border-radius:6px;padding:2px 10px;font-family:var(--fh);font-size:13px;font-weight:700;min-width:50px;text-align:center}
.h2h-away{flex:1}
.h2h-winner{font-weight:700}

/* ── 내 예측 버튼 ── */
.pred-btns{display:flex;gap:6px;margin-top:10px}
.pred-btn{flex:1;padding:8px;border-radius:var(--r);border:1px solid var(--bdr2);background:transparent;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--fb)}
.pred-btn.sel-h{background:var(--bb);border-color:var(--bb2);color:var(--blue)}
.pred-btn.sel-d{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:var(--t1)}
.pred-btn.sel-a{background:var(--rb);border-color:var(--rb2);color:var(--red)}
.pred-saved{font-size:11px;color:var(--green);margin-top:6px;text-align:center}

/* ── 조합 탭 ── */
.combo-page{padding:18px;max-width:700px}
.combo-match-row{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.cmr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cmr-teams{font-size:13px;font-weight:600;color:var(--t1)}
.cmr-remove{background:transparent;border:1px solid var(--bdr2);border-radius:8px;padding:3px 10px;font-size:11px;color:var(--t3);cursor:pointer}

/* ── 반응형 768px ── */
@media(max-width:768px){

}

/* ── 모바일 터치 영역 확대 ── */
@media(max-width:768px){

/* ── 심판 뱃지 ── */

/* ── chart-num (기록탭) ── */

/* ── 소형 모바일 (480px) ── */
@media(max-width:480px){

// ════════════════════════════════════════════════════════════════════
//  PL PREDICT — 리팩토링 엔진 (v5.1)
//
//  레이어 구조:
//  L1. 유틸리티   — 순수 함수 (입력→출력, side-effect 없음)
//  L2. 전처리     — 팀 지표 계산 (xG, 폼, 스쿼드, Elo 등)
//  L3. 예측 코어  — rawH 생성 (공통 함수 1개)
//  L4. 확률 파이프라인 — S1~S9 (공통 함수 1개)
//  L5. 조합픽     — GW별 독립 생성 (예측 로직과 완전 분리)
//
//  핵심 원칙:
//  - 모든 함수 = 입력→출력, 외부 상태 수정 금지
//  - calcOdds / predictAtGW = 공통 코어 공유 (중복 제거)
//  - 조합픽 = results 배열 기반 후처리 (예측 내부 로직 없음)
// ════════════════════════════════════════════════════════════════════

// ────────────────────────────────────────────────────────────────────
//  L1. 유틸리티 — 순수 함수
// ────────────────────────────────────────────────────────────────────

/** 로지스틱 변환 (k=0.09, x0=50) */
function logistic(x) { return 1 / (1 + Math.exp(-0.09 * (x - 50))); }

/** 폼 배열 → 승점 환산 (W=3, D=1, L=0) */
function formPts(form) { return form.reduce((s,r) => s + (r==='W'?3:r==='D'?1:0), 0); }

/** 포아송 PMF: P(X=k | λ) */
const _logFact = [0];
function _logFactorial(n) {
  for(let i = _logFact.length; i <= n; i++) _logFact[i] = _logFact[i-1] + Math.log(i);
  return _logFact[Math.min(n, 20)];
}
function poissonPMF(lambda, k) {
  return Math.exp(k * Math.log(Math.max(0.001, lambda)) - lambda - _logFactorial(k));
}

/** 포아송 기반 홈승/무/원정 확률 (최대 6골) */
function calcPoissonProbs(homeXG, awayXG) {
  let pH=0, pD=0, pA=0;
  for(let h=0; h<=6; h++) for(let a=0; a<=6; a++) {
    const p = poissonPMF(homeXG, h) * poissonPMF(awayXG, a);
    if(h > a) pH+=p; else if(h===a) pD+=p; else pA+=p;
  }
  const tot = pH+pD+pA;
  return { pH: pH/tot, pD: pD/tot, pA: pA/tot };
}

/** 재귀(DFS) 조합 생성: picks에서 r개 선택 */
function generateCombinations(picks, r) {
  const result = [];
  function dfs(start, cur) {
    if(cur.length === r) { result.push([...cur]); return; }
    for(let i=start; i<picks.length; i++) { cur.push(picks[i]); dfs(i+1, cur); cur.pop(); }
  }
  dfs(0, []);
  return result;
}

/** 폼 상태 분류 (good / normal / bad) */
function formState(form) {
  const p = formPts(form);
  return p>=11 ? 'good' : p>=6 ? 'normal' : 'bad';
}

/** 전술 타입 분류 (포메이션 기반) */
function tacticType(fm) {
  if(['532','343','4141'].includes(fm)) return '수비형';
  if(['433','4231'].includes(fm)) return '혼합형';
  return '공격형';
}

/** 결정론적 시드 난수 (백테스트용) */
function seededRnd(seed) {
  // MurmurHash3 기반 결정론적 난수 (0~1)
  let s = (seed*3571 + 1) & 0x7FFFFFFF;
  s = ((s>>>16)^s)*0x45d9f3b; s = (s&0xFFFFFFFF)>>>0;
  s = ((s>>>16)^s)*0x45d9f3b; s = (s&0xFFFFFFFF)>>>0;
  return (((s>>>16)^s)>>>0) / 4294967296;  // ← 괄호 필수! 연산자 우선순위
}

// ────────────────────────────────────────────────────────────────────
//  L2. 전처리 — 팀 지표 계산 (순수 함수, TEAMS/TEAM_STATS 읽기만)
// ────────────────────────────────────────────────────────────────────

/** 팀 스쿼드 강도 (0~100 지수) */
function squadStrength(tkey) {
  const t = TEAMS[tkey];
  if(!t) return 65;
  const matches = (t.w+t.d+t.l) || 31;
  return Math.round(50 + (t.pts/matches)*14 + (t.gd/matches)*2.2);
}

/** 팀 홈 승률 */
function homeWinRate(tkey) {
  const s = TEAM_STATS[tkey];
  if(!s) return 0.50;
  const n = s.hW+s.hD+s.hL;
  return n>0 ? s.hW/n : 0.50;
}

/** 팀 원정 승률 */
function awayWinRate(tkey) {
  const s = TEAM_STATS[tkey];
  if(!s) return 0.32;
  const n = s.aW+s.aD+s.aL;
  return n>0 ? s.aW/n : 0.32;
}

/** 일정 피로도 (휴식일 기반) */
function restFatigue(tkey) {
  const s = TEAM_STATS[tkey];
  const rest = s ? s.restDays : 5;
  if(rest<=3) return 'high';
  if(rest<=5) return 'medium';
  return 'low';
}

/** 팀 xG 지표 (득점/실점 기반 근사) */
function getTeamXG(tkey) {
  const t=TEAMS[tkey], s=TEAM_STATS[tkey];
  if(!t || !s) return { xgFor:1.4, xgAgainst:1.4 };
  const n = (t.w+t.d+t.l)||31;
  return {
    xgFor:     Math.max(0.3, s.gf/n),
    xgAgainst: Math.max(0.3, s.ga/n),
  };
}

/** 경기별 예상 xG (홈/원정) */
function calcMatchXG(hk, ak) {
  const hxg=getTeamXG(hk), axg=getTeamXG(ak);
  return {
    homeXG: Math.max(0.3, (hxg.xgFor * axg.xgAgainst) / EPL_AVG_GOALS * 1.1),
    awayXG: Math.max(0.3, (axg.xgFor * hxg.xgAgainst) / EPL_AVG_GOALS),
  };
}

/** 피로도 (키 없으면 폼 기반 fallback) */
function fatigueLevel(tkey, form) {
  const rf = restFatigue(tkey);
  if(rf !== 'medium') return rf;
  const r = (form||[]).slice(0,3);
  if(r.filter(x=>x==='W').length===3) return 'high';
  if(r.filter(x=>x==='W').length===0 && r.filter(x=>x==='L').length>=2) return 'high';
  return 'medium';
}

// ────────────────────────────────────────────────────────────────────
//  L3. 예측 코어 — rawH 생성 (공통 함수 1개)
//  calcOdds / predictAtGW 모두 이 함수를 호출
// ────────────────────────────────────────────────────────────────────

/**
 * buildRawH — 11가지 조건 + 신규 조건으로 rawH 계산
 * @param {object} ctx - { hPts, aPts, hGD, aGD, hForm, aForm, hk, ak, gw }
 * @returns {object} { rawH, components } — 순수 계산값
 */
function buildRawH(ctx) {
  const { hPts, aPts, hGD, aGD, hForm, aForm, hk, ak, gw } = ctx;
  const h=TEAMS[hk], a=TEAMS[ak];
  const nf = ['D','D','D'];

  let rawH = 48.0;  // 조건1 기준값 (EPL 시뮬 H발생률 51%에 맞게 보정)

  const ptsDiff = (hPts-aPts)/5;
  rawH += ptsDiff;                                                   // 조건2 승점차
  const gdAdj   = (hGD-aGD)*0.055;
  rawH += gdAdj;                                                     // 조건3 득실차
  const hFP = formPts(hForm.length?hForm:nf);
  const aFP = formPts(aForm.length?aForm:nf);
  const formDiff = (hFP-aFP)*0.85;
  rawH += formDiff;                                                  // 조건4 폼
  rawH += 8;                                                         // 조건5 홈어드밴티지
  const h2h = H2H[hk+'-'+ak]||H2H[ak+'-'+hk];
  const h2hAdj = h2h ? ((h2h.homeWin[hk]||50)-50)*0.12 : 0;
  rawH += h2hAdj;                                                    // 조건6 H2H
  const gwBoost = gw>=17&&gw<=26?1.8:gw>=33?1.2:gw<=5?-1.0:0.6;
  rawH += gwBoost;                                                   // 조건7 GW패턴
  const hfm=h.fm||'4231', afm=a.fm||'4231';
  const fmVal = MATCHUP_MATRIX[hfm]?.[afm] ?? 0;
  const fmAdj = fmVal*0.55;
  rawH += fmAdj;                                                     // 조건8 포메이션
  const sqAdj = (squadStrength(hk)-squadStrength(ak))*0.14;
  rawH += sqAdj;                                                     // 조건9 스쿼드
  rawH = Math.min(82, Math.max(16, rawH));
  // 조건10 배당편향 보정
  if(rawH>=68)      rawH=rawH*0.962+1.4;
  else if(rawH>=60) rawH=rawH*0.978+1.0;
  else if(rawH>=52) rawH=rawH*0.990+0.5;
  rawH = Math.min(80, Math.max(18, rawH));

  // 신규 조건: Elo 레이팅
  const eloH=eloRatings[hk]||1500, eloA=eloRatings[ak]||1500;
  const eloAdj = Math.max(-8, Math.min(8, (eloH-eloA)*0.015));
  rawH += eloAdj;
  // 신규 조건: 홈/원정 특화 승률
  const hwRate=homeWinRate(hk), awRate=awayWinRate(ak);
  const haAdj = Math.max(-8, Math.min(8, (hwRate-awRate)*12));
  rawH += haAdj;
  // 신규 조건: 일정 피로도
  const hRest=restFatigue(hk), aRest=restFatigue(ak);
  if(hRest==='low'  && aRest!=='low')  rawH+=2.0;
  if(aRest==='high')                   rawH+=2.5;
  if(hRest==='high' && aRest!=='high') rawH-=2.0;
  // 신규 조건: xG 기반 보정
  const { homeXG, awayXG } = calcMatchXG(hk, ak);
  const xgDiff = homeXG - awayXG;
  const xgAdj  = Math.max(-8, Math.min(8, xgDiff*6.5));
  rawH += xgAdj;
  rawH = Math.min(80, Math.max(18, rawH));

  // 신규: 심판 보정 (fixId가 있을 때만)
  const refAdj = ctx.fixId ? getRefereeAdj(ctx.fixId, hk) : {rawAdj:0,cardAdj:0,refName:'',style:''};
  rawH += Math.max(-2, Math.min(2, refAdj.rawAdj));
  rawH = Math.min(80, Math.max(18, rawH));

  return {
    rawH, h2hAdj, fmAdj, sqAdj, gdAdj, ptsDiff, formDiff,
    refAdj: refAdj.rawAdj, refName: refAdj.refName, refStyle: refAdj.style,
    cardRate: refAdj.cardRate || 3.5,
    eloAdj, haAdj, xgAdj, xgDiff,
    homeXG, awayXG, eloH, eloA,
    hwRate: Math.round(hwRate*100), awRate: Math.round(awRate*100),
    hRest, aRest, hfm, afm,
    gwBoost,
  };
}

// ────────────────────────────────────────────────────────────────────
//  L4. 확률 파이프라인 — S1~S9 (공통 함수 1개)
//  buildRawH 결과를 받아 최종 확률 산출
//  btCache 캘리브레이션: 실시간 예측에만 적용 (applyCalib=true)
// ────────────────────────────────────────────────────────────────────

/**
 * runProbPipeline — S1~S9 파이프라인
 * @param {number} rawH
 * @param {object} meta - { hk, ak, hForm, aForm, xgDiff, homeXG, awayXG, hRest, aRest, hfm, afm }
 * @param {boolean} applyCalib - 백테스트에서는 false
 * @returns {object} { fH, fD, fA, confidence, notRecommended, upsetRisk, poisson }
 */
function runProbPipeline(rawH, meta, applyCalib=true) {
  const { hk, ak, hForm, aForm, xgDiff, homeXG, awayXG, hRest, aRest, hfm, afm } = meta;
  const nf=['D','D','D'];
  const hFS  = formState(hForm||nf);
  const aFS  = formState(aForm||nf);
  const hFat = fatigueLevel(hk, hForm||nf);
  const aFat = fatigueLevel(ak, aForm||nf);
  const hTac = tacticType(hfm||'4231');
  const aTac = tacticType(afm||'4231');
  const oddsFav  = 100/Math.max(1,rawH);
  const awayOdds = 100/Math.max(1,100-rawH);

  // [S1] 로지스틱 변환
  let winProb  = logistic(rawH);
  let awayProb = 1-winProb;

  // [S3] 무승부 확률 — EPL 2015-2025 통계 기반 정밀 모델
  // EPL 실제 무승부: 전체 26%, 박빙 경기 34%, 수비전 30%
  const proximity = Math.max(0, 12-Math.abs(rawH-50));  // 0~12 (박빙도)
  // 기본값: rawH가 50에 가까울수록 무승부 증가 (로지스틱 형태)
  let drawProb = 0.22 + proximity * 0.010;               // 22%~34%

  // xG 차이가 작을수록 무승부 ↑ (공격력 균형 = 결착 없음)
  const xgBalance = Math.max(0, 1.2 - Math.abs(xgDiff));
  drawProb += xgBalance * 0.022;  // 최대 +2.6%

  // 수비형 전술: 득점 기회 감소 → 무승부 빈도 높음
  // EPL 통계: 수비전 무승부율 31%, 공격전 22%
  if(hTac==='수비형' && aTac==='수비형') drawProb += 0.05;   // 양팀 수비: +5%
  else if(hTac==='수비형' || aTac==='수비형') drawProb += 0.02; // 한팀 수비: +2%

  // 총 xG가 낮으면 (저득점 경기) 무승부 ↑
  const totalXG = homeXG + awayXG;
  if(totalXG < 2.2) drawProb += 0.04;   // 저득점 예상 +4%
  else if(totalXG < 2.6) drawProb += 0.02; // 보통 이하 +2%

  // 승점 차이가 작을수록 무승부 ↑ (TEAMS 데이터 활용)
  const hTeamPts = TEAMS[hk]?.pts || 0;
  const aTeamPts = TEAMS[ak]?.pts || 0;
  const ptsDiffAbs = Math.abs(hTeamPts - aTeamPts);
  if(ptsDiffAbs <= 3) drawProb += 0.03;  // 1위 차 이내 +3%
  else if(ptsDiffAbs <= 7) drawProb += 0.015; // 3위 차 이내 +1.5%

  // [S4] 시너지 보정 (과적합 방지: 단일 보정 ≤ ±3%)
  if(hFS==='good')  winProb+=0.025;   // 홈 폼 GOOD +2.5%
  if(aFat==='high') winProb+=0.025;   // 원정 피로 HIGH +2.5%
  if(hFS==='bad')   winProb-=0.030;   // 홈 폼 BAD -3.0%
  if(hFat==='high') winProb-=0.025;   // 홈 피로 HIGH -2.5%
  if(aFS==='good')  winProb-=0.020;   // 원정 폼 GOOD -2.0%
  if(aRest==='high') winProb+=0.020;  // 원정 충분 휴식 +2.0%
  if(hRest==='high') winProb-=0.015;  // 홈 피로 -1.5%
  // 누적 보정 클램프: 합계 최대 ±5%
  winProb = Math.max(logistic(rawH)-0.05, Math.min(logistic(rawH)+0.12, winProb));
  if(Math.abs(rawH-50)<8) drawProb+=0.020;

  // [S5] 배당 시장 보정 (클램프 ≤ ±5%)
  if(oddsFav<1.4 && hFS==='bad') { awayProb+=0.045; winProb-=0.030; }
  if(Math.abs(oddsFav-awayOdds)<0.5) drawProb+=0.030;

  // [S6] 재정규화 (하한선 적용)
  winProb  = Math.max(0.12, winProb);
  awayProb = Math.max(0.08, awayProb);
  drawProb = Math.max(0.22, Math.min(0.34, drawProb));
  const tot1 = winProb+awayProb+drawProb;
  winProb/=tot1; awayProb/=tot1; drawProb/=tot1;

  // [S7] EPL 앵커링 (Platt 대신)
  winProb  = winProb*0.93  + 0.462*0.07;
  awayProb = awayProb*0.93 + 0.285*0.07;
  drawProb = drawProb*0.93 + 0.253*0.07;
  const tot2 = winProb+drawProb+awayProb;
  winProb/=tot2; drawProb/=tot2; awayProb/=tot2;

  // 포아송 혼합
  const poisson = calcPoissonProbs(homeXG, awayXG);
  let fW = winProb*0.70  + poisson.pH*0.30;
  let fD2= drawProb*0.60 + poisson.pD*0.40;
  let fA2= awayProb*0.70 + poisson.pA*0.30;
  const tot3=fW+fD2+fA2;
  fW/=tot3; fD2/=tot3; fA2/=tot3;

  let fH=Math.round(fW*100);
  let fD=Math.max(20, Math.min(34, Math.round(fD2*100)));
  let fA=Math.max(8, 100-fH-fD);
  fH=100-fD-fA;

  // [S11] btCache 캘리브레이션 (실시간만)
  if(applyCalib && btCache?.calibBuckets) {
    const cb = btCache.calibBuckets.find(b=>fH>=b.predMin&&fH<=b.predMax);
    if(cb && Math.abs(cb.diff)<=12) {
      const adj=Math.round(cb.diff*0.40);
      fH=Math.max(20,Math.min(74,fH+adj));
      fA=Math.max(8,Math.min(48,fA-Math.round(adj*0.4)));
      fD=100-fH-fA;
    }
  }
  fD=Math.max(20,Math.min(34,fD)); fA=Math.max(8,fA); fH=100-fD-fA;

  // [S8] 신뢰도
  const scoreDiff=Math.abs((TEAMS[hk]?.pts||0)-(TEAMS[ak]?.pts||0));
  const h2h=H2H[hk+'-'+ak]||H2H[ak+'-'+hk];
  let conf=52;
  conf+=Math.min(12,scoreDiff*0.25);
  if(h2h)               conf+=5;
  if(hFS==='good'||aFS==='bad') conf+=4;
  conf+=3;
  if(hFat==='high') conf-=4;
  if(aFat==='high') conf+=3;
  if(scoreDiff<=4)  conf-=5;
  if(rawH>=65||rawH<=35) conf+=5;
  if(Math.abs((eloRatings[hk]||1500)-(eloRatings[ak]||1500))>80) conf+=3;
  conf=Math.max(50,Math.min(78,Math.round(conf)));  // 과적합 방지: max 78%

  // 이변 위험
  let upsetRisk='LOW';
  if(rawH>=55) {
    let risk=0;
    if(xgDiff<-0.3) risk+=2;
    if(poisson.pA>0.32) risk+=2;
    if(aFS==='good') risk+=2;
    if(hFS==='bad')  risk+=3;
    if(rawH>=65&&Math.abs(xgDiff)<0.3) risk+=2;
    upsetRisk=risk>=6?'HIGH':risk>=3?'MEDIUM':'LOW';
  }

  return {
    fH, fD, fA,
    confidence: conf,
    notRecommended: conf<55,
    upsetRisk,
    poisson,
    hFormState:hFS, aFormState:aFS,
    hFatigue:hFat, aFatigue:aFat,
    hTac, aTac,
    oddsFav: parseFloat(oddsFav.toFixed(2)),
  };
}

// ────────────────────────────────────────────────────────────────────
//  공개 API: calcOdds (실시간 예측 — 캘리브레이션 적용)
// ────────────────────────────────────────────────────────────────────
function calcOdds(hk, ak, gw) {
  const h=TEAMS[hk], a=TEAMS[ak];
  // L3: rawH 계산 (현재 팀 데이터 사용)
  const rh = buildRawH({
    hPts:h.pts, aPts:a.pts, hGD:h.gd, aGD:a.gd,
    hForm:h.form, aForm:a.form, hk, ak, gw,
    fixId: `${hk}-${ak}`,  // 심판 조회용
  });
  // L4: 파이프라인 (캘리브레이션 적용)
  const prob = runProbPipeline(rh.rawH, {
    hk, ak, hForm:h.form, aForm:a.form,
    xgDiff:rh.xgDiff, homeXG:rh.homeXG, awayXG:rh.awayXG,
    hRest:rh.hRest, aRest:rh.aRest, hfm:rh.hfm, afm:rh.afm,
  }, true);

  // 골 예측 (포아송 기반)
  const expGoals = (rh.homeXG+rh.awayXG).toFixed(2);
  const over25 = Math.min(78,Math.max(32,Math.round(
    (1-poissonPMF(rh.homeXG+rh.awayXG,0)-poissonPMF(rh.homeXG+rh.awayXG,1)
     -poissonPMF(rh.homeXG+rh.awayXG,2))*100)));
  const btts = Math.min(72,Math.max(28,Math.round(
    (1-Math.exp(-rh.homeXG))*(1-Math.exp(-rh.awayXG))*100)));

  // ── 배당 시장 혼합 (모델 75% + 시장 25%) ──
  let fH = prob.fH, fD = prob.fD, fA = prob.fA;
  let marketUsed = false;
  const mktKey = hk+'-'+ak;
  const mkt = marketOddsCache?.[mktKey] || marketOddsCache?.[ak+'-'+hk];
  if(mkt && mkt.h && mkt.d && mkt.a) {
    // 시장 임플라이드 확률 (over-round 제거)
    const rawMktH = 1/mkt.h, rawMktD = 1/mkt.d, rawMktA = 1/mkt.a;
    const mktTotal = rawMktH+rawMktD+rawMktA;
    const mktH = Math.round(rawMktH/mktTotal*100);
    const mktD = Math.round(rawMktD/mktTotal*100);
    const mktA = 100-mktH-mktD;
    fH = Math.round(prob.fH*0.75 + mktH*0.25);
    fD = Math.round(prob.fD*0.60 + mktD*0.40);
    fA = 100-fH-fD;
    marketUsed = true;
  }

  return {
    finalH:fH, finalD:fD, finalA:fA,
    gwGoal:expGoals, over25, btts,
    marketUsed, mktH:mkt?Math.round(100/mkt.h/3*2):null,
    // 기여도
    h2hAdj:Math.round(rh.h2hAdj*10)/10,
    fmAdj: Math.round(rh.fmAdj*10)/10,
    sqAdj: Math.round(rh.sqAdj*10)/10,
    gdAdj: Math.round(rh.gdAdj*10)/10,
    ptsDiff:Math.round(rh.ptsDiff*10)/10,
    formDiff:Math.round(rh.formDiff*10)/10,
    eloAdj: Math.round(rh.eloAdj*10)/10,
    haAdj:  Math.round(rh.haAdj*10)/10,
    xgRawAdj:Math.round(rh.xgAdj*10)/10,
    // xG/포아송
    matchHomeXG:rh.homeXG.toFixed(2),
    matchAwayXG:rh.awayXG.toFixed(2),
    poissonH:Math.round(prob.poisson.pH*100),
    poissonD:Math.round(prob.poisson.pD*100),
    poissonA:Math.round(prob.poisson.pA*100),
    // 메타
    rawH:Math.round(rh.rawH), oddsFav:prob.oddsFav,
    hFormState:prob.hFormState, aFormState:prob.aFormState,
    hFatigue:prob.hFatigue, aFatigue:prob.aFatigue,
    hRest:rh.hRest, aRest:rh.aRest,
    hTac:prob.hTac, aTac:prob.aTac,
    confidence:prob.confidence, notRecommended:prob.notRecommended,
    scoreDiff:Math.round(Math.abs(h.pts-a.pts)),
    upsetRisk:prob.upsetRisk,
    eloH:rh.eloH, eloA:rh.eloA,
    hwRate:rh.hwRate, awRate:rh.awRate,
    // 심판 정보
    refName:  rh.refName  || '미배정',
    refStyle: rh.refStyle || '',
    cardRate: rh.cardRate || 3.5,
    refAdj:   Math.round((rh.refAdj||0)*10)/10,
  };
}

// ────────────────────────────────────────────────────────────────────
//  공개 API: detectRisk (위험도 분석)
// ────────────────────────────────────────────────────────────────────
function detectRisk(hk, ak, o) {
  const h=TEAMS[hk], a=TEAMS[ak];
  const aFp=formPts(a.form), hFp=formPts(h.form);
  const hW=h.form.filter(r=>r==='W').length;
  const aW=a.form.filter(r=>r==='W').length;
  const ptsDiff=Math.abs(h.pts-a.pts);
  const risks=[], warns=[], pos=[];

  if(o.upsetRisk==='HIGH')
    risks.push(`⚠️ 이변 감지: 원정 xG 우위 (${o.matchAwayXG} vs ${o.matchHomeXG}) + 폼 역전`);
  else if(o.upsetRisk==='MEDIUM')
    warns.push(`⚡ 이변 가능성 — 원정 포아송 ${o.poissonA}% 주목`);

  if(o.finalH>=65) {
    if(aFp>=11) risks.push(`원정팀 최근 5경기 ${aFp}pts — 상승세 위험`);
    if(a.rank<=6) risks.push(`${a.name} 상위 ${a.rank}위 — 역배 위험`);
    if(hW<=2&&aW>=3) risks.push(`폼 역전: 홈 ${hW}승 vs 원정 ${aW}승`);
    if(h.form.slice(0,3).filter(r=>r!=='W').length>=2) risks.push('홈팀 최근 3경기 부진');
    if(o.hFatigue==='high') risks.push(`홈팀 피로도 높음 (${TEAM_STATS[hk]?.restDays||5}일 휴식)`);
    if(o.aFormState==='good') warns.push('원정팀 폼 GOOD — 이변 가능성');
    if(o.eloA && o.eloH && o.eloA>o.eloH+50) risks.push(`Elo 역전: 원정(${o.eloA}) > 홈(${o.eloH})`);
  }
  if(o.finalH>=50&&o.finalH<65) {
    if(aFp>=9) warns.push(`원정팀 폼(${aFp}pts) 강함`);
    if(ptsDiff<=8) warns.push(`승점 차 ${ptsDiff}pts — 박빙`);
    if(o.hTac==='수비형'&&o.aTac==='수비형') warns.push('양팀 수비형 — 무승부 확률 상승');
    if(o.awRate && o.hwRate && o.awRate>o.hwRate)
      warns.push(`원정 원정승률(${o.awRate}%) > 홈 홈승률(${o.hwRate}%)`);
  }
  if(o.notRecommended) warns.push(`신뢰도 ${o.confidence}% — 예측 비추천`);
  if(hW>=4) pos.push(`홈팀 최근 ${hW}승 최고 폼`);
  if(ptsDiff>=22) pos.push(`승점 차 ${ptsDiff}pts 구조적 우위`);
  if(a.form.filter(r=>r==='L').length>=3) pos.push('원정팀 폼 저조');
  if(o.aFatigue==='high') pos.push('원정팀 피로도 높음');
  if(o.matchHomeXG && parseFloat(o.matchHomeXG)>parseFloat(o.matchAwayXG)+0.4)
    pos.push(`홈 xG 우위 (${o.matchHomeXG} vs ${o.matchAwayXG})`);

  let level='normal';
  if(risks.length>=2||(risks.length>=1&&o.finalH>=68)||o.upsetRisk==='HIGH') level='high';
  else if(risks.length>=1||warns.length>=2||o.upsetRisk==='MEDIUM') level='med';
  if(o.notRecommended&&level==='normal') level='med';
  const certain=o.finalH>=65&&level==='normal'&&risks.length===0&&hW>=3&&ptsDiff>=14&&o.confidence>=60&&o.upsetRisk==='LOW';
  return { risks, warns, pos, level, certain };
}

// ────────────────────────────────────────────────────────────────────
//  백테스트 전용: predictAtGW
//  buildRawH + runProbPipeline 공유 (캘리브레이션 없음)
// ────────────────────────────────────────────────────────────────────

/** GW 시점까지 누적 폼 조회 */
function getFormAtGW(teamKey, gw, history) {
  return history
    .filter(m=>(m.home===teamKey||m.away===teamKey)&&m.gw<gw)
    .slice(-5)
    .map(m=>m.home===teamKey?(m.result==='H'?'W':m.result==='D'?'D':'L'):(m.result==='A'?'W':m.result==='D'?'D':'L'));
}
/** GW 시점까지 누적 포인트 */
function getPtsAtGW(teamKey, gw, history) {
  return history.filter(m=>(m.home===teamKey||m.away===teamKey)&&m.gw<gw)
    .reduce((pts,m)=>pts+(m.home===teamKey?(m.result==='H'?3:m.result==='D'?1:0):(m.result==='A'?3:m.result==='D'?1:0)),0);
}
/** GW 시점까지 누적 득실차 */
function getGDAtGW(teamKey, gw, history) {
  return history.filter(m=>(m.home===teamKey||m.away===teamKey)&&m.gw<gw)
    .reduce((gd,m)=>gd+(m.home===teamKey?(m.result==='H'?1.8:m.result==='D'?0:-1.8):(m.result==='A'?1.8:m.result==='D'?0:-1.8)),0);
}

function predictAtGW(hk, ak, gw, history) {
  const hPts=getPtsAtGW(hk,gw,history), aPts=getPtsAtGW(ak,gw,history);
  const hGD=getGDAtGW(hk,gw,history),   aGD=getGDAtGW(ak,gw,history);
  // 블렌딩: 초반엔 최종 순위 강도 혼합
  const blend=Math.min(1,(gw-1)/8);
  const rh = buildRawH({
    hPts: hPts*blend+TEAMS[hk].pts*(1-blend),
    aPts: aPts*blend+TEAMS[ak].pts*(1-blend),
    hGD:  hGD*blend+TEAMS[hk].gd*(1-blend),
    aGD:  aGD*blend+TEAMS[ak].gd*(1-blend),
    hForm: getFormAtGW(hk,gw,history),
    aForm: getFormAtGW(ak,gw,history),
    hk, ak, gw,
  });
  const prob = runProbPipeline(rh.rawH, {
    hk, ak,
    hForm:getFormAtGW(hk,gw,history),
    aForm:getFormAtGW(ak,gw,history),
    xgDiff:rh.xgDiff, homeXG:rh.homeXG, awayXG:rh.awayXG,
    hRest:rh.hRest, aRest:rh.aRest, hfm:rh.hfm, afm:rh.afm,
  }, false); // 백테스트: 캘리브레이션 미적용

  const { fH, fD, fA } = prob;
  // 개선된 3-way 예측:
  // EPL 통계: 홈승 51%, 무 21%, 원정승 28%
  // fH >= fA → 홈팀 우세 상황에선 H (무승부는 박빙 박빙일 때만)
  let pred;
  if(fH >= fA) {
    // 홈 우세: 무승부는 fD가 fH의 90% 이상이고 매우 박빙일 때만
    if(fD >= fH * 0.90 && Math.abs(fH - fA) <= 6) pred = 'D';
    else pred = 'H';
  } else {
    // 원정 우세: 비슷한 로직
    if(fD >= fA * 0.90 && Math.abs(fH - fA) <= 6) pred = 'D';
    else pred = 'A';
  }
  const conf = pred==='H'?fH : pred==='A'?fA : fD;
  return { fH, fD, fA, pred, conf };
}

// ────────────────────────────────────────────────────────────────────
//  L5. 조합픽 — 예측 로직과 완전 분리
//  FIXTURES → results 배열 → GW별 조합 생성
// ────────────────────────────────────────────────────────────────────

/** 단일 경기 최선 픽 분석 */
function bestPick(f) {
  const o=calcOdds(f.home,f.away,f.gw);
  const risk=detectRisk(f.home,f.away,o);
  let pick,pct,label;
  if(o.finalH>=o.finalD&&o.finalH>=o.finalA)
    { pick='H'; pct=o.finalH; label=TEAMS[f.home].name+' 홈 승'; }
  else if(o.finalA>o.finalD)
    { pick='A'; pct=o.finalA; label=TEAMS[f.away].name+' 원정 승'; }
  else
    { pick='D'; pct=o.finalD; label='무승부'; }
  const impliedOdds=parseFloat((100/pct).toFixed(2));
  const value=parseFloat(((pct/100)*impliedOdds-1).toFixed(3));
  const reason=pick==='H'?`홈 ${o.finalH}% · Elo ${o.eloH} · 홈승률 ${o.hwRate}%`
    :pick==='A'?`원정 ${o.finalA}% · Elo ${o.eloA} · 원정승률 ${o.awRate}%`
    :`무승부 ${o.finalD}% · xG차 ${Math.abs(parseFloat(o.matchHomeXG||0)-parseFloat(o.matchAwayXG||0)).toFixed(2)}`;
  return { pick,pct,label,reason,impliedOdds,value,
    certain:risk.certain, riskLevel:risk.level, upsetRisk:o.upsetRisk||'LOW',
    confidence:o.confidence||60, rawH:o.rawH||50,
    finalH:o.finalH, finalD:o.finalD, finalA:o.finalA, fix:f, odds:o };
}

/** 조합 지표 계산 (순수 함수) */
function calcComboPct(picks)        { return picks.reduce((a,p)=>a*(p.pct/100),1)*100; }
function calcComboConfidence(picks) { return picks.length?Math.round(picks.reduce((s,p)=>s+p.confidence,0)/picks.length):0; }
function calcComboValue(picks)      { return parseFloat(picks.reduce((s,p)=>s+p.value,0).toFixed(3)); }
function calcExpectedReturn(picks)  { const p=calcComboPct(picks)/100; return parseFloat((p*(1/p)).toFixed(3)); }

/** 4가지 필터 기준 */
const COMBO_FILTERS = {
  safe:  p => p.confidence>=60 && Math.abs(p.finalH-p.finalA)>=10 && p.finalD<32
            && Math.abs(p.rawH-50)>=6 && p.riskLevel!=='high' && p.upsetRisk!=='HIGH',
  value: p => p.confidence>=55 && Math.abs(p.rawH-50)>=6 && p.finalD<32
            && p.riskLevel!=='high' && p.upsetRisk!=='HIGH' && p.pct>=46 && p.pct<=75,
  upset: p => p.confidence>=55 && Math.abs(p.finalH-p.finalA)<15 && p.upsetRisk!=='LOW',
};

/** 조합 패키지 생성 (Top-K 포함) */
function buildComboPackage(candidates, foldSize, type, label, desc, riskLabel, topK) {
  if(candidates.length < foldSize) return [];
  const combos = generateCombinations(candidates, foldSize);
  const scored = combos.map(picks => ({
    picks,
    score: type==='safe'  ? calcComboPct(picks) :
           type==='value' ? calcComboValue(picks) :
                            1/Math.max(0.01,calcComboPct(picks)),
  })).sort((a,b)=>b.score-a.score);

  return scored.slice(0,topK).map((entry,rank) => {
    const picks=entry.picks;
    const prob=calcComboPct(picks);
    return {
      type, label:`${label} ${foldSize}폴`, desc, rank:rank+1, picks,
      comboProb:   parseFloat(prob.toFixed(1)),
      comboOdds:   parseFloat((100/prob).toFixed(2)),
      avgConf:     calcComboConfidence(picks),
      certCount:   picks.filter(p=>p.certain).length,
      expectedReturn: calcExpectedReturn(picks),
      value:       calcComboValue(picks),
      riskLabel, foldSize,
    };
  });
}

/**
 * buildGWCombos — GW별 독립 조합 생성 (핵심 엔트리포인트)
 * FIXTURES → GW별 그룹화 → 필터 → 재귀 조합 → Top-K → 결과 반환
 */
function buildGWCombos() {
  // STEP 1: GW별 그룹화
  const byGW = {};
  FIXTURES.forEach(f => { (byGW[f.gw]||(byGW[f.gw]=[])).push(f); });

  const TOP_K = { s2:3,s3:3,s4:1, v3:3,v4:2, u:2 };

  return Object.entries(byGW).sort((a,b)=>a[0]-b[0]).reduce((acc,[gw,fixes])=>{
    const gwNum = parseInt(gw);
    // STEP 2: 전체 경기 분석
    const all  = fixes.map(f=>bestPick(f));
    // STEP 3: 필터 적용
    const safe  = all.filter(COMBO_FILTERS.safe) .sort((a,b)=>b.confidence-a.confidence);
    const value = all.filter(COMBO_FILTERS.value).sort((a,b)=>b.value-a.value);
    const upset = all.filter(COMBO_FILTERS.upset).sort((a,b)=>b.confidence-a.confidence);
    // STEP 4: 조합 생성 (2,3,4폴)
    const combos=[
      ...buildComboPackage(safe,  2,'safe', '🛡️ 안전','고신뢰 필터','낮음',  TOP_K.s2),
      ...buildComboPackage(safe,  3,'safe', '🛡️ 안전','역배 제외 3폴','낮음', TOP_K.s3),
      ...buildComboPackage(safe,  4,'safe', '🛡️ 안전 4폴','고신뢰 4경기','보통',TOP_K.s4),
      ...buildComboPackage(value, 3,'value','⚡ 밸류','배당가치 최적','보통', TOP_K.v3),
      ...buildComboPackage(value, 4,'value','⚡ 밸류 4폴','기대수익 극대화','보통',TOP_K.v4),
      ...(upset.length>=1&&safe.length>=1
        ? buildComboPackage([...upset.slice(0,1),...safe.slice(0,1)],2,'upset','🎯 이변+안전','이변 혼합','높음',TOP_K.u)
        : []),
      ...(upset.length>=2 ? buildComboPackage(upset,2,'upset','🎯 순수 이변','이변 전용','매우 높음',1) : []),
    ];
    if(!combos.length) return acc;
    const bestCombo=[...combos].sort((a,b)=>b.comboProb-a.comboProb)[0];
    acc.push({
      gw:gwNum, combos, bestCombo,
      safeCnt:  combos.filter(c=>c.type==='safe').length,
      valueCnt: combos.filter(c=>c.type==='value').length,
      upsetCnt: combos.filter(c=>c.type==='upset').length,
      totalFixtures: fixes.length,
      passedFilter:  safe.length,
    });
    return acc;
  },[]);
}

// ────────────────────────────────────────────────────────────────────
//  미사용 함수 제거 (teamStr, getRankAtGW, applyCalibratedOdds 제거)
//  updateElo 내부 전용 (eloRatings 뮤테이션) — 백테스트에서만 호출
// ────────────────────────────────────────────────────────────────────
// _updateElo: 백테스트 확장 시 사용 (현재 미활성)
function _updateElo(winnerKey, loserKey, isDraw) {
  const K=32, hw=eloRatings[winnerKey]||1500, lw=eloRatings[loserKey]||1500;
  const expW=1/(1+Math.pow(10,(lw-hw)/400));
  eloRatings[winnerKey]=Math.round(hw+K*((isDraw?0.5:1)-expW));
  eloRatings[loserKey] =Math.round(lw+K*((isDraw?0.5:0)-(1-expW)));
}



function getH2H(hk,ak){
  const key=hk+'-'+ak, keyR=ak+'-'+hk;
  return H2H[key]||H2H[keyR]||null;
}

function calcH2HStats(h2h,hk,ak){
  let hW=0,aW=0,dW=0,totalGoals=0;
  h2h.matches.forEach(m=>{
    const parts=m.s.split('-').map(Number);
    const hTeamScore=m.h===hk?parts[0]:parts[1];
    const aTeamScore=m.h===hk?parts[1]:parts[0];
    totalGoals+=parts[0]+parts[1];
    if(hTeamScore>aTeamScore) hW++;
    else if(hTeamScore<aTeamScore) aW++;
    else dW++;
  });
  const n=h2h.matches.length;
  return{hW,dW,aW,avgGoals:(totalGoals/n).toFixed(1),n};
}

// 현재 날짜 기준 가장 가까운 GW 자동 선택
function autoSelectCurrentGW(){
  const now = new Date();
  const gwDateMap = {
    32: new Date('2026-04-11'),
    33: new Date('2026-04-19'),
    34: new Date('2026-04-26'),
    35: new Date('2026-05-03'),
    36: new Date('2026-05-10'),
  };
  let closestGW = 32;
  let minDiff = Infinity;
  Object.entries(gwDateMap).forEach(([gw, d])=>{
    const diff = Math.abs(now - d);
    if(diff < minDiff){ minDiff=diff; closestGW=parseInt(gw); }
  });
  // 3일 이내면 해당 GW 자동 선택, 아니면 전체
  if(minDiff < 4*24*3600*1000){
    gwFilter = closestGW;
    const btn = [...document.querySelectorAll('.gw-filter-btn')].find(b=>b.getAttribute('onclick')?.includes('filterGW('+closestGW));
    document.querySelectorAll('.gw-filter-btn').forEach(b=>b.classList.remove('on'));
    if(btn) btn.classList.add('on');
    const title = document.getElementById('sb-gw-title');
    if(title) title.textContent = 'GW'+closestGW+' 경기 (자동감지)';
  }
}

function renderFixtures(){

  let lastGW = null;
  let html = '';
  filtered.forEach((f,i)=>{
    const globalIdx = FIXTURES.indexOf(f);
    const h=TEAMS[f.home],a=TEAMS[f.away];
    const o=calcOdds(f.home,f.away,f.gw);
    const risk=detectRisk(f.home,f.away,o);
    const inCombo=comboMatches.includes(f.id);
    const isFuture = f.gw > 32;
    // UX 뱃지: 확률·신뢰도·이변 종합 판단
    let badge='';
    if(risk.certain && o.confidence>=65)
      badge=`<div class="b-cert">🔥 확실 ${o.finalH}%</div>`;
    else if(o.upsetRisk==='HIGH')

    else if(risk.level==='high')
      badge=`<div class="b-risk">역배 주의</div>`;
    else if(Math.abs(o.finalH-o.finalA)<=12)
      badge=`<div class="b-warn">⚖️ 접전</div>`;
    else if(risk.level==='med')
      badge=`<div class="b-warn">주의</div>`;
    else badge='<div></div>';
    if(f.gw !== lastGW){
      const gwDates={32:'4월 11-13일',33:'4월 19-20일',34:'4월 26-27일',35:'5월 3-4일',36:'5월 10-11일'};
      html+=`<div class="gw-separator">GW${f.gw} · ${gwDates[f.gw]||''}${isFuture?'<span class="gw-future-note">예정</span>':''}</div>`;
      lastGW=f.gw;
    }
    html+=`<div class="fc ${currentFixIdx===globalIdx?'on':''} ${inCombo?'in-combo':''}" id="fc${globalIdx}" onclick="selectMatch(${globalIdx})">
      <div class="fc-top">
        <div class="tc">
          <div style="display:flex;align-items:center;gap:5px">
            <div class="tbadge" style="background:${h.color}">${f.home}</div>
            <div><div class="tname">${h.name}</div><div class="tmeta">${h.rank}위 · GW${f.gw}</div></div>
          </div>
          <div class="tform">${h.form.map(fd).join('')}</div>
        </div>
        <div class="vc">
          <div class="vtime">${f.date} ${f.time}</div>
          <div class="pbar"><div class="pbh" style="flex:${o.finalH}"></div><div class="pbd" style="flex:${o.finalD}"></div><div class="pba" style="flex:${o.finalA}"></div></div>
          <div class="pns"><span style="color:var(--blue)">${o.finalH}%</span><span style="color:var(--t3)">${o.finalD}%</span><span style="color:var(--red)">${o.finalA}%</span></div>
          <div style="display:flex;justify-content:center;gap:4px;margin-top:3px">
            <span style="font-size:9px;background:var(--bg3);border-radius:8px;padding:1px 6px;color:${o.confidence>=65?'var(--green)':o.confidence>=55?'var(--blue)':'var(--t3)'}">신뢰 ${o.confidence}%</span>
          </div>
        </div>
        <div class="tc" style="text-align:right">
          <div style="display:flex;align-items:center;gap:5px;justify-content:flex-end">
            <div style="text-align:right"><div class="tname">${a.name}</div><div class="tmeta">${a.rank}위</div></div>
            <div class="tbadge" style="background:${a.color}">${f.away}</div>
          </div>
          <div class="tform r">${a.form.map(fd).join('')}</div>
        </div>
      </div>
      <div class="badgerow">
        ${badge}
        <button class="combo-add-btn ${inCombo?'added':''}" onclick="event.stopPropagation();toggleCombo('${f.id}',${globalIdx})">${inCombo?'✓ 추가됨':'+ 조합 추가'}</button>
      </div>
    </div>`;
  });
  document.getElementById('fixture-list').innerHTML = html;
  updateComboHint();
}

// ────────────────────────────────────────────────────────
//  렌더: 경기 분석
// ────────────────────────────────────────────────────────
function selectMatch(i){
  currentFixIdx=i;
  renderFixtures();
  const f=FIXTURES[i];
  const h=TEAMS[f.home],a=TEAMS[f.away];
  const o=calcOdds(f.home,f.away,f.gw);
  const risk=detectRisk(f.home,f.away,o);
  const h2hData=getH2H(f.home,f.away);
  const winner=o.finalH>o.finalA&&o.finalH>o.finalD?'H':o.finalA>o.finalH&&o.finalA>o.finalD?'A':'D';
  const bucket=ODDS_CALIB.find(b=>o.finalH>=b.min&&o.finalH<=b.max)||ODDS_CALIB[2];
  const existPred=myPredictions.find(p=>p.fixId===f.id);

  let alertHTML='';
  if(risk.certain) alertHTML=`<div class="al-c"><div class="al-ico">✓</div><div><div class="al-ttl">확실 — 고신뢰 예측 경기</div><div class="al-msg">역배 위험 없음 · 유사 구간 실제 적중률 ${bucket.actual}% (${bucket.n}경기)<br>${risk.pos.map(p=>`· ${p}`).join('<br>')}</div></div></div>`;
  else if(risk.level==='high') alertHTML=`<div class="al-r"><div class="al-ico">!</div><div><div class="al-ttl">역배 주의 — 이변 가능성 감지</div><div class="al-msg">${risk.risks.map(r=>`· ${r}`).join('<br>')}</div></div></div>`;
  else if(risk.level==='med') alertHTML=`<div class="al-w"><div class="al-ico">~</div><div><div class="al-ttl">주의 — 이변 요소 존재</div><div class="al-msg">${[...risk.risks,...risk.warns].map(r=>`· ${r}`).join('<br>')}</div></div></div>`;

  // H2H 섹션
  let h2hHTML='';
  if(h2hData){
    const stats=calcH2HStats(h2hData,f.home,f.away);
    const hwPct=h2hData.homeWin[f.home]||50;
    const matchRows=h2hData.matches.map(m=>{
      const parts=m.s.split('-').map(Number);
      const hScore=m.h===f.home?parts[0]:parts[1];
      const aScore=m.h===f.home?parts[1]:parts[0];
      const hWon=hScore>aScore,aWon=aScore>hScore;
      return `<div class="h2h-match-row">
        <div class="h2h-date">${m.d}</div>
        <div class="h2h-home ${hWon?'h2h-winner':''}" style="color:${hWon?h.color:'var(--t2)'}">${f.home}</div>
        <div class="h2h-score">${hScore} - ${aScore}</div>
        <div class="h2h-away ${aWon?'h2h-winner':''}" style="color:${aWon?a.color:'var(--t2)'}">${f.away}</div>
      </div>`;
    }).join('');
    const barH=Math.round(stats.hW/stats.n*100);
    const barD=Math.round(stats.dW/stats.n*100);
    const barA=Math.round(stats.aW/stats.n*100);
    h2hHTML=`<div class="sc">
      <div class="sch">H2H 상대전적 <span class="schn">최근 ${stats.n}경기 · ${o.h2hAdj!==0?`H2H 보정 ${o.h2hAdj>0?'+':''}${o.h2hAdj}%`:'H2H 영향 미미'}</span></div>
      <div class="scb">
        <div class="h2h-grid">
          <div class="h2h-stat"><div class="h2h-val" style="color:${h.color}">${stats.hW}</div><div class="h2h-lbl">${f.home} 승</div></div>
          <div class="h2h-stat"><div class="h2h-val" style="color:var(--t2)">${stats.dW}</div><div class="h2h-lbl">무승부</div></div>
          <div class="h2h-stat"><div class="h2h-val" style="color:${a.color}">${stats.aW}</div><div class="h2h-lbl">${f.away} 승</div></div>
        </div>
        <div class="h2h-bar-row"><div class="h2h-bar-lbl">${f.home} 승</div><div class="h2h-bar-track"><div class="h2h-bar-fill" style="width:${barH}%;background:${h.color}"></div></div><div class="h2h-bar-val" style="color:${h.color}">${barH}%</div></div>
        <div class="h2h-bar-row"><div class="h2h-bar-lbl">무승부</div><div class="h2h-bar-track"><div class="h2h-bar-fill" style="width:${barD}%;background:var(--t3)"></div></div><div class="h2h-bar-val">${barD}%</div></div>
        <div class="h2h-bar-row" style="margin-bottom:12px"><div class="h2h-bar-lbl">${f.away} 승</div><div class="h2h-bar-track"><div class="h2h-bar-fill" style="width:${barA}%;background:${a.color}"></div></div><div class="h2h-bar-val" style="color:${a.color}">${barA}%</div></div>
        <div style="margin-bottom:8px;display:flex;justify-content:space-between">
          <div style="font-size:11px;color:var(--t3)">평균 득점 <b style="color:var(--t1)">${stats.avgGoals}</b>골/경기</div>
          <div style="font-size:11px;color:var(--t3)">${h.name} 홈 승률 <b style="color:${h.color}">${hwPct}%</b></div>
        </div>
        ${matchRows}
      </div>
    </div>`;
  }

  // 내 예측 섹션
  const predSel=existPred?existPred.pick:'';
  // ── 결과 직접 입력 UI ──
  const savedPred = myPredictions.find(p=>p.fixId===f.id);
  const resultInputHTML = `
    <div class="sc" style="margin-bottom:10px">
      <div class="sch">⚽ 경기 결과 입력 <span class="schn">종료 후 기록 → Elo·기록 자동 갱신</span></div>
      <div class="scb">
        <div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:10px">
          <div style="flex:1;text-align:center">
            <div style="font-size:10px;color:var(--t3);margin-bottom:4px">${h.name}</div>
            <input type="number" id="score-h-${f.id}" min="0" max="20" value="${savedPred?.scoreH??''}" placeholder="0"
              style="width:100%;padding:10px;text-align:center;background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;color:var(--blue);font-size:24px;font-weight:800;font-family:var(--fh)">
          </div>
          <div style="font-size:20px;color:var(--t3);padding-bottom:8px;font-weight:700">:</div>
          <div style="flex:1;text-align:center">
            <div style="font-size:10px;color:var(--t3);margin-bottom:4px">${a.name}</div>
            <input type="number" id="score-a-${f.id}" min="0" max="20" value="${savedPred?.scoreA??''}" placeholder="0"
              style="width:100%;padding:10px;text-align:center;background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;color:var(--red);font-size:24px;font-weight:800;font-family:var(--fh)">
          </div>
        </div>
        <button onclick="submitMatchResult('${f.id}','${f.home}','${f.away}',${globalIdx})"
          style="width:100%;padding:10px;background:var(--purple);border:none;border-radius:var(--r);font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:var(--fb);transition:opacity .15s">
          결과 저장 → 예측 기록 자동 업데이트
        </button>
        ${savedPred?.scoreH!=null?`<div style="margin-top:8px;text-align:center;font-size:12px;color:var(--green)">✅ 기록됨: ${savedPred.scoreH}-${savedPred.scoreA} (${savedPred.scoreH>savedPred.scoreA?'홈승':savedPred.scoreH<savedPred.scoreA?'원정승':'무승부'})</div>`:''}
      </div>
    </div>`;

  const myPredHTML=`<div class="sc">
    <div class="sch">내 예측 저장 <span class="schn">${existPred?'예측 저장됨 ✓':'아직 예측 없음'}</span></div>
    <div class="scb">
      <div style="font-size:12px;color:var(--t2);margin-bottom:6px">이 경기 결과를 예측하고 나중에 적중률을 확인하세요</div>
      <div class="pred-btns">
        <button class="pred-btn ${predSel==='H'?'sel-h':''}" onclick="savePrediction('${f.id}','${f.home} vs ${f.away}','${f.date}','H','${f.home} 홈 승')">🏠 ${h.name}<br><span style="font-size:10px;color:inherit;opacity:.8">${o.finalH}%</span></button>
        <button class="pred-btn ${predSel==='D'?'sel-d':''}" onclick="savePrediction('${f.id}','${f.home} vs ${f.away}','${f.date}','D','무승부')">— 무승부<br><span style="font-size:10px;color:inherit;opacity:.8">${o.finalD}%</span></button>
        <button class="pred-btn ${predSel==='A'?'sel-a':''}" onclick="savePrediction('${f.id}','${f.home} vs ${f.away}','${f.date}','A','${f.away} 원정 승')">✈ ${a.name}<br><span style="font-size:10px;color:inherit;opacity:.8">${o.finalA}%</span></button>
      </div>
      ${existPred?`<div class="pred-saved">저장됨: ${existPred.pickLabel} 예측 · 내 기록 탭에서 확인</div>`:''}
    </div>
  </div>`;

  // 예측 근거 요약 (5대 핵심 요인)
  const reasonItems = [
    { label:'승점 차이',   val: o.ptsDiff,  unit:'%', color: o.ptsDiff>0?'var(--green)':'var(--red)',   icon:'📊' },
    { label:'홈 어드밴티지', val:'+8',       unit:'%', color:'var(--blue)',                              icon:'🏠' },
    { label:'최근 폼',     val: o.formDiff, unit:'%', color: o.formDiff>0?'var(--green)':'var(--red)',  icon:'📈' },
    { label:'H2H 보정',    val: o.h2hAdj,  unit:'%', color: o.h2hAdj>0?'var(--green)':o.h2hAdj<0?'var(--red)':'var(--t3)', icon:'🔁' },
    { label:'xG 보정',     val: o.xgRawAdj,unit:'%', color: o.xgRawAdj>0?'var(--green)':'var(--red)', icon:'⚡' },
    { label:'Elo 보정',    val: o.eloAdj,  unit:'%', color: o.eloAdj>0?'var(--green)':o.eloAdj<0?'var(--red)':'var(--t3)', icon:'🏆' },
  ].filter(r => r.val !== undefined && r.val !== 0);
  const reasonHTML = reasonItems.map(r=>`
    <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)">
      <span style="font-size:13px">${r.icon}</span>
      <span style="font-size:11px;color:var(--t2);flex:1">${r.label}</span>
      <span style="font-size:12px;font-weight:700;color:${r.color}">${r.val>0?'+':''}${r.val}${r.unit}</span>
    </div>`).join('');
  const upsetHtml = o.upsetRisk==='HIGH'
    ? `<div style="background:var(--rb);border:1px solid var(--rb2);border-radius:var(--r);padding:10px 14px;margin-bottom:10px;display:flex;gap:8px;align-items:center">
        <span style="font-size:18px">⚠️</span>
        <div><div style="font-size:12px;font-weight:700;color:var(--red)">이변 경고 — 강팀 통계 대비 원정팀 xG 우위</div>
        <div style="font-size:11px;color:var(--t2);margin-top:2px">홈 xG ${o.matchHomeXG} vs 원정 xG ${o.matchAwayXG} · 원정 포아송 ${o.poissonA}%</div></div>
       </div>`
    : o.upsetRisk==='MEDIUM'
    ? `<div style="background:var(--ab);border:1px solid var(--ab2);border-radius:var(--r);padding:8px 14px;margin-bottom:10px;font-size:11px;color:var(--amber)">
        ⚡ 이변 가능성 — 원정 포아송 ${o.poissonA}%으로 주목 필요</div>`
    : '';

  document.getElementById('empty-s').style.display='none';
  document.getElementById('analysis').style.display='block';
  document.getElementById('analysis').innerHTML=`<div class="aw">
    <div class="mhero">
      <div class="ht">
        <div class="htm">
          <div class="hbadge" style="background:${h.color}">${f.home}</div>
          <div><div class="hname" style="color:${h.color}">${h.name}</div><div class="hmeta">${h.rank}위 · ${h.pts}pts · ${h.stadium}</div>
          <div style="display:flex;gap:3px;margin-top:4px">${h.form.map(r=>`<div class="fd ${r==='W'?'fw':r==='D'?'fdr':'fl'}" style="width:15px;height:15px;font-size:7px">${r}</div>`).join('')}</div></div>
        </div>
        <div class="hvs"><div class="hvstxt">VS</div><div style="font-size:10px;color:var(--t3)">GW${f.gw}</div><div style="font-size:10px;color:var(--t3)">${f.date}</div></div>
        <div class="htm r">
          <div style="text-align:right"><div class="hname" style="color:${a.color}">${a.name}</div><div class="hmeta">${a.stadium} · ${a.pts}pts · ${a.rank}위</div>
          <div style="display:flex;gap:3px;margin-top:4px;justify-content:flex-end">${a.form.map(r=>`<div class="fd ${r==='W'?'fw':r==='D'?'fdr':'fl'}" style="width:15px;height:15px;font-size:7px">${r}</div>`).join('')}</div></div>
          <div class="hbadge" style="background:${a.color}">${f.away}</div>
        </div>
      </div>
      <div class="p3">
        <div class="pc ${winner==='H'?'wh':''}"><div class="pclbl">${h.name} 홈 승</div><div class="pcpct">${o.finalH}%</div><div class="pcodds">배당 ${(100/o.finalH).toFixed(2)}배</div></div>
        <div class="pc"><div class="pclbl">무승부</div><div class="pcpct" style="color:var(--t2)">${o.finalD}%</div><div class="pcodds">배당 ${(100/o.finalD).toFixed(2)}배</div></div>
        <div class="pc ${winner==='A'?'wa':''}"><div class="pclbl">${a.name} 원정 승</div><div class="pcpct">${o.finalA}%</div><div class="pcodds">배당 ${(100/o.finalA).toFixed(2)}배</div></div>
      </div>
      ${o.marketUsed ? `<div style="background:rgba(245,158,11,.1);border:1px solid var(--ab2);border-radius:var(--r);padding:6px 12px;margin-top:8px;font-size:11px;color:var(--amber);display:flex;align-items:center;gap:6px">
        <span>💰</span><span><b>배당 시장 반영됨</b> — 모델 75% + 시장 배당 25% 혼합 예측</span>
      </div>` : ''}
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center">
        <button onclick="shareAnalysis('${f.home}','${f.away}',o)"
          style="background:var(--bg3);border:1px solid var(--bdr2);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;font-family:var(--fb);display:flex;align-items:center;gap:5px">
          📋 분석 공유
        </button>
        <div style="display:flex;align-items:center;gap:5px;background:${o.confidence>=65?'var(--gb)':o.confidence>=55?'var(--bb)':'var(--ab)'};border:1px solid ${o.confidence>=65?'var(--gb2)':o.confidence>=55?'var(--bb2)':'var(--ab2)'};border-radius:20px;padding:4px 12px">
          <span style="font-size:10px;color:${o.confidence>=65?'var(--green)':o.confidence>=55?'var(--blue)':'var(--amber)'}">신뢰도</span>
          <span style="font-family:var(--fh);font-size:14px;font-weight:800;color:${o.confidence>=65?'var(--green)':o.confidence>=55?'var(--blue)':'var(--amber)'}">${o.confidence}%</span>
        </div>
        ${o.notRecommended?'<div style="background:var(--rb);border:1px solid var(--rb2);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;color:var(--red)">⚠ 예측 비추천</div>':''}
        <div style="font-size:10px;color:var(--t3)">홈 전술: <b style="color:var(--t2)">${o.hTac}</b></div>
        <div style="font-size:10px;color:var(--t3)">원정 전술: <b style="color:var(--t2)">${o.aTac}</b></div>
        <div style="font-size:10px;color:var(--t3)">홈 피로: <b style="color:${o.hFatigue==='high'?'var(--red)':'var(--green)'}">${o.hFatigue==='high'?'높음':o.hFatigue==='medium'?'보통':'낮음'}</b></div>
        <div style="font-size:10px;color:var(--t3)">원정 피로: <b style="color:${o.aFatigue==='high'?'var(--red)':'var(--green)'}">${o.aFatigue==='high'?'높음':o.aFatigue==='medium'?'보통':'낮음'}</b></div>
      </div>
    </div>
    ${upsetHtml}
    ${alertHTML}
    ${resultInputHTML}

    <div class="sc" style="margin-bottom:10px">
      <div class="sch" style="font-size:13px">📊 예측 근거 — 핵심 요인 분석 <span class="schn">rawH=${o.rawH}% 기준</span></div>
      <div class="scb" style="padding:10px 14px">
        ${reasonHTML || '<div style="font-size:11px;color:var(--t3)">근거 데이터 없음</div>'}
        <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
          <div style="background:var(--bg3);border-radius:6px;padding:4px 10px;font-size:10px;color:var(--t3)">
            홈 전술: <b style="color:var(--t1)">${o.hTac}</b>
          </div>
          <div style="background:var(--bg3);border-radius:6px;padding:4px 10px;font-size:10px;color:var(--t3)">
            원정 전술: <b style="color:var(--t1)">${o.aTac}</b>
          </div>
          <div style="background:var(--bg3);border-radius:6px;padding:4px 10px;font-size:10px;color:var(--t3)">
            홈 피로: <b style="color:${o.hFatigue==='high'?'var(--red)':'var(--green)'}">${o.hFatigue==='high'?'높음':'보통'}</b>
          </div>
          <div style="background:var(--bg3);border-radius:6px;padding:4px 10px;font-size:10px;color:var(--t3)">
            신뢰도: <b style="color:${o.confidence>=65?'var(--green)':o.confidence>=55?'var(--blue)':'var(--amber)'}">${o.confidence}%</b>
          </div>
          ${o.notRecommended ? '<div style="background:var(--rb);border-radius:6px;padding:4px 10px;font-size:10px;color:var(--red)">⚠ 예측 비추천</div>' : ''}
        </div>
      </div>
    </div>
    ${o.refName && o.refName!=='미배정' ? `

function toggleCombo(fixId,i){
  if(comboMatches.includes(fixId)){
    comboMatches=comboMatches.filter(id=>id!==fixId);
    delete comboPicks[fixId];
  } else {
    if(comboMatches.length>=8){ alert('최대 8경기까지 조합 가능합니다'); return; }
    comboMatches.push(fixId);
  }
  updateComboHint();
  renderFixtures();
  renderComboTab();
}

function updateComboHint(){
  const cnt=comboMatches.length;
  const hint=document.getElementById('combo-hint');
  const badge=document.getElementById('combo-badge');
  const tabBadge=document.getElementById('combo-cnt');
  hint.style.display=cnt>0?'flex':'none';
  badge.textContent=cnt;
  tabBadge.style.display=cnt>0?'inline':'none';
  tabBadge.textContent=cnt;
}

function setComboPickUI(fixId,pick){
  comboPicks[fixId]=pick;
  renderComboTab();
}

function renderComboTab(){
  const ra=document.getElementById('combo-result-area');
  const la=document.getElementById('combo-list-area');
  if(comboMatches.length===0){
    ra.innerHTML='';
    la.innerHTML=`<div class="combo-empty"><div style="font-size:32px;opacity:.3;margin-bottom:10px">📋</div><div style="font-size:14px;font-weight:600;margin-bottom:6px">조합 경기가 없습니다</div><div style="font-size:12px">경기 예측 탭에서 + 조합 추가 버튼을 클릭하세요</div></div>`;
    return;
  }

  const fixtures=comboMatches.map(id=>FIXTURES.find(f=>f.id===id)).filter(Boolean);
  let comboPct=1;
  let allPicked=true;
  fixtures.forEach(f=>{
    const o=calcOdds(f.home,f.away,f.gw);
    const pick=comboPicks[f.id];
    if(!pick){ allPicked=false; return; }
    const pct=pick==='H'?o.finalH:pick==='D'?o.finalD:o.finalA;
    comboPct*=(pct/100);
  });
  const comboPctFinal=Math.round(comboPct*100*10)/10;
  const comboOdds=allPicked?(100/comboPctFinal).toFixed(2):'--';
  const bucket=ODDS_CALIB.find(b=>comboPctFinal>=b.min&&comboPctFinal<=b.max)||ODDS_CALIB[ODDS_CALIB.length-1];
  const simWins=allPicked?bucket.actual:'--';

  ra.innerHTML=`<div class="combo-result">
    <div style="font-size:11px;color:var(--t3);margin-bottom:6px">${fixtures.length}경기 조합 분석</div>
    <div class="combo-result-pct" style="color:${allPicked?(comboPctFinal>=20?'var(--green)':comboPctFinal>=8?'var(--amber)':'var(--red)'):'var(--t3)'}">${allPicked?comboPctFinal+'%':'결과 선택 필요'}</div>
    <div class="combo-result-odds" style="color:${allPicked?'var(--t1)':'var(--t3)'}">배당 ${comboOdds}배</div>
    <div class="combo-result-lbl">조합 전체 적중 확률 · 각 경기 결과를 아래에서 선택하세요</div>
    ${allPicked?`<div class="combo-accuracy">
      <div class="ca-cell"><div class="ca-val" style="color:var(--blue)">${comboPctFinal}%</div><div class="ca-lbl">이론 적중 확률</div></div>
      <div class="ca-cell"><div class="ca-val" style="color:var(--green)">${simWins}%</div><div class="ca-lbl">과거 유사 적중률</div></div>
      <div class="ca-cell"><div class="ca-val" style="color:var(--amber)">${comboOdds}배</div><div class="ca-lbl">환산 배당</div></div>
    </div>`:''}
    ${allPicked&&comboPctFinal<5?`<div class="combo-warn" style="margin-top:10px">⚠ 조합 확률 ${comboPctFinal}% — 고위험 조합입니다. 경기 수를 줄이거나 확실한 경기만 선택하세요</div>`:''}
    ${allPicked?`<button class="save-combo-btn" onclick="saveCombo()">내 기록에 조합 저장</button>`:''}
  </div>`;

  la.innerHTML=fixtures.map(f=>{
    const h=TEAMS[f.home],a=TEAMS[f.away];
    const o=calcOdds(f.home,f.away,f.gw);
    const pick=comboPicks[f.id]||'';
    return `<div class="combo-match-row">
      <div class="cmr-top">
        <div>
          <div class="cmr-teams">${h.name} vs ${a.name}</div>
          <div style="font-size:10px;color:var(--t3)">${f.date} ${f.time} · GW${f.gw}</div>
        </div>
        <button class="cmr-remove" onclick="toggleCombo('${f.id}')">제거</button>
      </div>
      <div class="cmr-picks">
        <button class="cmr-pick ${pick==='H'?'sel-h':''}" onclick="setComboPickUI('${f.id}','H')">
          <span style="font-size:10px;display:block;color:${h.color}">${f.home}</span>
          홈 승 ${o.finalH}%
        </button>
        <button class="cmr-pick ${pick==='D'?'sel-d':''}" onclick="setComboPickUI('${f.id}','D')">
          무승부 ${o.finalD}%
        </button>
        <button class="cmr-pick ${pick==='A'?'sel-a':''}" onclick="setComboPickUI('${f.id}','A')">
          <span style="font-size:10px;display:block;color:${a.color}">${f.away}</span>
          원정 승 ${o.finalA}%
        </button>
      </div>
      ${pick?`<div class="cmr-prob">선택: <b style="color:${pick==='H'?'var(--blue)':pick==='A'?'var(--red)':'var(--t1)'}">${pick==='H'?h.name+' 홈 승':pick==='D'?'무승부':a.name+' 원정 승'}</b> · 확률 ${pick==='H'?o.finalH:pick==='D'?o.finalD:o.finalA}%</div>`:''}
    </div>`;
  }).join('');
}

function loadPredictions(){
  try{ return JSON.parse(localStorage.getItem('pl_predictions')||'[]'); }
  catch(e){ return []; }
}
function savePredictions(){ localStorage.setItem('pl_predictions', JSON.stringify(myPredictions)); }

function savePrediction(fixId,matchName,date,pick,pickLabel){
  const existing=myPredictions.findIndex(p=>p.fixId===fixId);
  const entry={fixId,matchName,date,pick,pickLabel,outcome:'pending',savedAt:new Date().toLocaleDateString('ko-KR')};
  if(existing>=0) myPredictions[existing]=entry;
  else myPredictions.unshift(entry);
  savePredictions();
  updateRecBadge();
  selectMatch(currentFixIdx); // 재렌더
}

function saveCombo(){
  const fixtures=comboMatches.map(id=>FIXTURES.find(f=>f.id===id)).filter(Boolean);
  let comboPct=1;
  const picks=[];
  fixtures.forEach(f=>{
    const o=calcOdds(f.home,f.away,f.gw);
    const pick=comboPicks[f.id];
    if(!pick) return;
    const pct=pick==='H'?o.finalH:pick==='D'?o.finalD:o.finalA;
    comboPct*=(pct/100);
    picks.push({fixId:f.id,match:`${f.home} vs ${f.away}`,pick,pct});
  });
  const entry={
    fixId:'combo_'+Date.now(),
    matchName:`${fixtures.length}경기 조합 (${picks.map(p=>p.pick).join('·')})`,
    date:fixtures[0].date,
    pick:'COMBO',
    pickLabel:`조합 ${Math.round(comboPct*1000)/10}% · ${(100/(comboPct*100)).toFixed(2)}배`,
    outcome:'pending',
    savedAt:new Date().toLocaleDateString('ko-KR'),
    isCombo:true,comboPct:Math.round(comboPct*1000)/10,
  };
  myPredictions.unshift(entry);
  savePredictions();
  updateRecBadge();
  alert(`조합이 내 기록에 저장되었습니다!
확률: ${entry.comboPct}% · 배당: ${(100/entry.comboPct).toFixed(2)}배`);
}

function renderRecord(){
  const page=document.getElementById('record-page');
  if(myPredictions.length===0){
    page.innerHTML=`<div class="no-records">아직 예측이 없습니다<br>경기 예측 탭에서 각 경기의 결과를 예측하고 저장하세요<br><br><span style="font-size:20px;opacity:.4">📊</span></div>`;
    return;
  }
  const total=myPredictions.length;
  const settled=myPredictions.filter(p=>p.outcome!=='pending').length;
  const correct=myPredictions.filter(p=>p.outcome==='correct').length;
  const accuracy=settled>0?Math.round(correct/settled*100):0;
  // 연속 적중
  let streak=0;
  for(let i=0;i<myPredictions.length;i++){
    if(myPredictions[i].outcome==='correct') streak++;
    else if(myPredictions[i].outcome==='wrong') break;
  }
  // 타입별 분석
  const byPick={H:{t:0,c:0},D:{t:0,c:0},A:{t:0,c:0}};
  myPredictions.forEach(p=>{
    const key=p.pick==='COMBO'?null:p.pick;
    if(key){ byPick[key].t++; if(p.outcome==='correct') byPick[key].c++; }
  });

  const rows=myPredictions.map((p,i)=>`
    <div class="rec-row">
      <div>

        ${p.outcome==='pending'?'결과 대기':p.outcome==='correct'?'✓ 적중':'✗ 빗나감'}
      </div>
      <button class="rec-del" onclick="deletePrediction(${i})">삭제</button>

  if(comboPreds.length > 0){
    const comboCorr = comboPreds.filter(p=>p.outcome==='correct').length;
    const comboWrng = comboPreds.filter(p=>p.outcome==='wrong').length;
    const comboAcc  = comboCorr+comboWrng>0 ? Math.round(comboCorr/(comboCorr+comboWrng)*100) : 0;
    const comboRows = comboPreds.map((p,ci)=>`
      <div class="rec-row">
        <div><div class="rec-match">${p.matchName}</div><div class="rec-date">${p.date} · ${p.savedAt||''}</div></div>
        <div class="rec-pick H" style="font-size:10px">${(p.pickLabel||'').slice(0,18)}</div>

        <button class="rec-del" onclick="deletePrediction(${myPredictions.indexOf(p)})">삭제</button>
      </div>`).join('');
    comboSection = `

        <div style="font-family:var(--fh);font-size:16px;font-weight:800;color:var(--t1);margin-bottom:10px">🎯 조합픽 성과 트래킹</div>

          <div class="rs-cell"><div class="rs-val" style="color:var(--purple)">${comboPreds.length}</div><div class="rs-lbl">저장 조합</div></div>
          <div class="rs-cell"><div class="rs-val" style="color:var(--green)">${comboCorr}</div><div class="rs-lbl">적중</div></div>
          <div class="rs-cell"><div class="rs-val" style="color:var(--red)">${comboWrng}</div><div class="rs-lbl">빗나감</div></div>
          <div class="rs-cell"><div class="rs-val" style="color:var(--amber)">${comboAcc}%</div><div class="rs-lbl">조합 적중률</div></div>
        </div>

  // 심판 배정 섹션

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        ${refEntries.slice(0,10).map(([fix,ref])=>{
          const rd=REFEREE_DB[ref]||{style:'미확인',cardRate:3.5};
          return '<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 10px">'
            +'<div style="font-size:11px;font-weight:600;color:var(--t1)">'+fix+'</div>'

  page.innerHTML=`
    <div class="rec-summary">
      <div class="rs-cell">
        <div class="rs-val" style="color:var(--t1)">${total}</div>
        <div class="rs-lbl">총 예측</div>

      </div>
      <div class="rs-cell">
        <div class="rs-val" style="color:var(--green)">${correct}</div>
        <div class="rs-lbl">적중</div>
        <div class="rs-sub">${settled-correct}개 빗나감</div>
      </div>
      <div class="rs-cell">
        <div class="rs-val" style="color:${accuracy>=60?'var(--green)':accuracy>=45?'var(--amber)':'var(--red)'}">${accuracy}%</div>
        <div class="rs-lbl">적중률</div>
        <div class="accuracy-bar"><div class="accuracy-fill" style="width:${accuracy}%"></div></div>
      </div>
      <div class="rs-cell">
        <div class="rs-val" style="color:${streak>=3?'var(--gold)':streak>=1?'var(--green)':'var(--t3)'}">${streak}</div>
        <div class="rs-lbl">연속 적중</div>
        <div class="rs-sub">${streak>=3?'🔥 핫스트릭!':streak>=1?'진행 중':'—'}</div>
      </div>
    </div>
    ${streak>=3?`<div style="display:flex;margin-bottom:12px"><div class="streak-badge">🔥 ${streak}연속 적중 진행 중!</div></div>`:''}
    <div class="sc" style="margin-bottom:12px">
      <div class="sch">예측 유형별 분석</div>
      <div class="scb">
        ${[['홈 승 예측','H','var(--blue)'],['무승부 예측','D','var(--t2)'],['원정 승 예측','A','var(--red)']].map(([l,k,c])=>{
          const d=byPick[k];const pct=d.t>0?Math.round(d.c/d.t*100):0;
          return `<div class="chart-bar-row">
            <div class="chart-lbl">${l}</div>
            <div class="chart-track"><div class="chart-fill" style="width:${pct}%;background:${c}">${pct>15?pct+'%':''}</div></div>
            <div class="chart-num" style="color:${c}">${d.c}/${d.t}</div>
          </div>`;
        }).join('')}
        <div style="font-size:10px;color:var(--t3);margin-top:6px">확정된 결과 기준 · 대기 중 예측 제외</div>
      </div>
    </div>
    <div style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:12px;font-weight:600;color:var(--t2)">전체 예측 기록</div>
      <div style="font-size:11px;color:var(--t3)">결과 칸 클릭 → 적중/빗나감 업데이트</div>
        <button onclick="exportRecords()" style="font-size:10px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:20px;padding:2px 10px;color:var(--t2);cursor:pointer;font-family:var(--fb)">📋 내보내기</button>
      </div>
    </div>
    ${rows}
    ${comboSection}
    ${refSection}`;
}

  const cur=myPredictions[idx].outcome;
  myPredictions[idx].outcome=cur==='pending'?'correct':cur==='correct'?'wrong':'pending';
