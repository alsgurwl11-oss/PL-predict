// ────────────────────────────────────────────────────────
//  API 연동 (football-data.org)
// ────────────────────────────────────────────────────────
async function fetchLive(){
  const key = localStorage.getItem('pl_predict_api_key');
  if(!key){
    document.getElementById('last-sync').textContent='API 키 없음';
    return;
  }
  const dot = document.getElementById('st-dot');
  const ico = document.getElementById('sync-ico');
  dot.className='st-dot load'; ico.className='sync-ico spin';
  document.getElementById('last-sync').textContent='업데이트 중...';

  // CORS 프록시 경유 fetch (직접 → 프록시1 → 프록시2)
  const CORS = ['https://corsproxy.io/?url=','https://api.allorigins.win/raw?url='];
  async function tryFetch(ep){
    const url = 'https://api.football-data.org/v4' + ep;
    try{ const r=await fetch(url,{headers:{'X-Auth-Token':key}}); if(r.ok) return r.json(); }catch(e){}
    for(const p of CORS){
      try{ const r=await fetch(p+encodeURIComponent(url),{headers:{'X-Auth-Token':key}}); if(r.ok) return r.json(); }catch(e){}
    }
    return null;
  }

  try{
    // 순위표 + 최근 경기 결과 병렬 fetch
    const [st, recentMatches] = await Promise.all([
      tryFetch('/competitions/PL/standings'),
      tryFetch('/competitions/PL/matches?status=FINISHED&limit=50'),
    ]);

    // ① 순위표 → TEAMS 실시간 갱신 (승점·순위·득실차)
    if(st?.standings){
      const table = st.standings[0].table;
      table.forEach(row => {
        const k = row.team.tla;
        if(TEAMS[k]){
          TEAMS[k].pts  = row.points;
          TEAMS[k].w    = row.won;
          TEAMS[k].d    = row.draw;
          TEAMS[k].l    = row.lost;
          TEAMS[k].gd   = row.goalDifference;
          TEAMS[k].rank = row.position;
        }
      });
    }

    // ② 최근 경기 결과 → 팀 폼 5경기 갱신 + TEAM_STATS 골 업데이트
    if(recentMatches?.matches){
      const byTeam = {};  // { TLA: [결과, ...] }
      const gfByTeam = {}, gaByTeam = {};
      recentMatches.matches.forEach(m => {
        const ht = m.homeTeam.tla, at = m.awayTeam.tla;
        if(!ht || !at) return;
        const hs = m.score?.fullTime?.home, as2 = m.score?.fullTime?.away;
        if(hs===null||as2===null) return;
        // 폼 결과
        (byTeam[ht]||(byTeam[ht]=[])).unshift(hs>as2?'W':hs===as2?'D':'L');
        (byTeam[at]||(byTeam[at]=[])).unshift(hs<as2?'W':hs===as2?'D':'L');
        // 골 집계
        gfByTeam[ht]=(gfByTeam[ht]||0)+hs; gaByTeam[ht]=(gaByTeam[ht]||0)+as2;
        gfByTeam[at]=(gfByTeam[at]||0)+as2; gaByTeam[at]=(gaByTeam[at]||0)+hs;
      });
      // TEAMS.form + TEAM_STATS.gf/ga 갱신
      Object.entries(byTeam).forEach(([k, results]) => {
        if(TEAMS[k]) TEAMS[k].form = results.slice(0,5);
        if(TEAM_STATS[k]){
          if(gfByTeam[k]) TEAM_STATS[k].gf = gfByTeam[k];
          if(gaByTeam[k]) TEAM_STATS[k].ga = gaByTeam[k];
        }
      });
    }

    dot.className='st-dot';
    const n=new Date();
    document.getElementById('last-sync').textContent=
      n.getHours().toString().padStart(2,'0')+':'+
      n.getMinutes().toString().padStart(2,'0')+' 업데이트';
    // ② 피로도 자동 계산 — 마지막 경기일 기반 restDays 갱신
    if(recentMatches?.matches) {
      const lastMatchDate = {};  // { TLA: Date }
      recentMatches.matches.forEach(m => {
        const d = new Date(m.utcDate);
        const ht = m.homeTeam.tla, at = m.awayTeam.tla;
        if(ht && (!lastMatchDate[ht] || d > lastMatchDate[ht])) lastMatchDate[ht] = d;
        if(at && (!lastMatchDate[at] || d > lastMatchDate[at])) lastMatchDate[at] = d;
      });
      const now = new Date();
      Object.entries(lastMatchDate).forEach(([tla, lastDate]) => {
        if(TEAM_STATS[tla]) {
          const days = Math.round((now - lastDate) / (1000*60*60*24));
          TEAM_STATS[tla].restDays = Math.max(0, Math.min(14, days));
        }
      });
    }

    // ③ 다음 경기 일정 + 심판 배정 → FIXTURES 자동 갱신
    const scheduled = await tryFetch('/competitions/PL/matches?status=SCHEDULED&limit=40');
    // 심판 배정 파싱
    if(scheduled?.matches) {
      scheduled.matches.forEach(m => {
        if(m.referees?.[0]?.name) {
          const fixKey = m.homeTeam.tla + '-' + m.awayTeam.tla;
          currentReferees[fixKey] = m.referees[0].name;
        }
      });
    }
    if(scheduled?.matches && scheduled.matches.length > 0) {
      const TLA_MAP = {}; // API TLA → 우리 TLA 매핑
      Object.keys(TEAMS).forEach(k => TLA_MAP[TEAMS[k].short||k] = k);
      const newFixtures = scheduled.matches.map((m,i) => {
        const hTLA = m.homeTeam.tla, aTLA = m.awayTeam.tla;
        const hKey = TLA_MAP[hTLA] || hTLA;
        const aKey = TLA_MAP[aTLA] || aTLA;
        if(!TEAMS[hKey] || !TEAMS[aKey]) return null;
        const d = new Date(m.utcDate);
        const dateStr = (d.getMonth()+1)+'월 '+d.getDate()+'일';
        const timeStr = d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
        return {
          id: 'api_'+m.id,
          home: hKey, away: aKey,
          date: dateStr, time: timeStr,
          gw: m.matchday || 32,
        };
      }).filter(Boolean);
      if(newFixtures.length > 0) {
        // 기존 FIXTURES 교체 (API 데이터 우선)
        FIXTURES.splice(0, FIXTURES.length, ...newFixtures);
        console.info('[fetchLive] FIXTURES 자동 갱신:', newFixtures.length, '경기');
      }
    }

    // ④ 결과 반영 → Elo 자동 업데이트
    if(recentMatches?.matches) {
      recentMatches.matches.slice(0,10).forEach(m => {
        const ht = m.homeTeam.tla, at = m.awayTeam.tla;
        if(!eloRatings[ht] || !eloRatings[at]) return;
        const hs = m.score?.fullTime?.home, as2 = m.score?.fullTime?.away;
        if(hs===null||as2===null||hs===undefined) return;
        if(hs > as2)  _updateElo(ht, at, false);
        else if(hs < as2) _updateElo(at, ht, false);
        else          _updateElo(ht, at, true);
      });
    }

    // ⑤ TEAM_STATS 홈/원정 성적 자동 갱신 (standings aggregateCoverage 활용)
    if(st?.standings) {
      const home = st.standings.find(s=>s.type==='HOME')?.table || [];
      const away = st.standings.find(s=>s.type==='AWAY')?.table || [];
      home.forEach(row => {
        const k = row.team.tla;
        if(TEAM_STATS[k]) {
          TEAM_STATS[k].hW=row.won; TEAM_STATS[k].hD=row.draw; TEAM_STATS[k].hL=row.lost;
        }
      });
      away.forEach(row => {
        const k = row.team.tla;
        if(TEAM_STATS[k]) {
          TEAM_STATS[k].aW=row.won; TEAM_STATS[k].aD=row.draw; TEAM_STATS[k].aL=row.lost;
        }
      });
    }

    // ⑥ 배당 시장 데이터 fetch (The Odds API 무료플랜)
    //    API 키 없어도 동작 (캐시 없으면 모델만 사용)
    const oddsKey = localStorage.getItem('pl_odds_api_key');
    if(oddsKey) {
      try {
        const oddsUrl = 'https://api.the-odds-api.com/v4/sports/soccer_epl/odds/'
          + '?apiKey='+oddsKey+'&regions=uk&markets=h2h&oddsFormat=decimal&bookmakers=bet365';
        const oddsRes = await fetch(oddsUrl).catch(()=>null);
        if(oddsRes?.ok) {
          const oddsData = await oddsRes.json();
          marketOddsCache = {};
          (oddsData||[]).forEach(game=>{
            const ht = game.home_team, at = game.away_team;
            // 팀명 → TLA 매핑 (부분 일치)
            const hKey = Object.keys(TEAMS).find(k=>TEAMS[k].name.includes(ht.split(' ')[0]));
            const aKey = Object.keys(TEAMS).find(k=>TEAMS[k].name.includes(at.split(' ')[0]));
            if(!hKey||!aKey) return;
            const bk = game.bookmakers?.[0];
            const mkt = bk?.markets?.find(m=>m.key==='h2h');
            if(!mkt) return;
            const outcomes = mkt.outcomes;
            const hOdds = outcomes.find(o=>o.name===ht)?.price;
            const aOdds = outcomes.find(o=>o.name===at)?.price;
            const dOdds = outcomes.find(o=>o.name==='Draw')?.price;
            if(hOdds&&dOdds&&aOdds) {
              marketOddsCache[hKey+'-'+aKey] = {h:hOdds, d:dOdds, a:aOdds};
            }
          });
          console.info('[fetchLive] 배당 데이터:', Object.keys(marketOddsCache).length, '경기');
        }
      } catch(oddsErr) {
        console.warn('[fetchLive] 배당 fetch 실패:', oddsErr.message);
      }
    }

    renderFixtures();
    renderStandings();
  } catch(e){
    console.warn('[fetchLive]', e.message);
    dot.className='st-dot err';
    document.getElementById('last-sync').textContent='오프라인 모드';
  }
  ico.className='sync-ico';
}

function renderPickItems(picks) {
  return picks.map((p,i) => {
    const h=TEAMS[p.fix.home], a=TEAMS[p.fix.away];
    const certBadge = p.certain
      ? '<span style="font-size:9px;background:var(--gb);color:var(--green);border:1px solid var(--gb2);border-radius:8px;padding:1px 6px;margin-left:4px">확실</span>' : '';
    const upBadge = p.upsetRisk==='HIGH'
      ? '<span style="font-size:9px;background:var(--rb);color:var(--red);border:1px solid var(--rb2);border-radius:8px;padding:1px 6px;margin-left:4px">⚠이변</span>'
      : p.upsetRisk==='MEDIUM'
      ? '<span style="font-size:9px;background:var(--ab);color:var(--amber);border:1px solid var(--ab2);border-radius:8px;padding:1px 6px;margin-left:4px">주의</span>' : '';
    const confColor = p.confidence>=70?'var(--green)':p.confidence>=60?'var(--blue)':'var(--amber)';
    const valColor  = p.value>0?'var(--green)':p.value<0?'var(--red)':'var(--t3)';
    return `<div class="aipick-item ${p.certain?'aipick-cert':''}">
      <div class="aipick-num">${i+1}</div>
      <div class="aipick-match">
        <div class="aipick-match-name">${h.name} vs ${a.name}${certBadge}${upBadge}</div>
        <div class="aipick-match-meta">${p.fix.date} ${p.fix.time} · GW${p.fix.gw}</div>
        <div class="aipick-match-meta" style="margin-top:2px;color:var(--t2)">${p.reason}</div>
        <div style="display:flex;gap:8px;margin-top:3px">
          <span style="font-size:9px;color:${valColor}">Value: ${p.value>0?'+':''}${p.value}</span>
          <span style="font-size:9px;color:var(--t3)">배당: ${p.impliedOdds}배</span>
          <span style="font-size:9px;color:${confColor}">신뢰도: ${p.confidence}%</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="aipick-pick ${p.pick}">${p.label}</div>
        <div style="font-size:11px;font-weight:700;color:${p.pick==='H'?'var(--blue)':p.pick==='A'?'var(--red)':'var(--t2)'};margin-top:3px">${p.pct}%</div>
      </div>
    </div>`;
  }).join('');
}

function renderComboCard(combo, gwStr, ci) {
  const typeColor  = combo.type==='safe'?'var(--green)':combo.type==='value'?'var(--blue)':'var(--red)';
  const typeBg     = combo.type==='safe'?'var(--gb)':combo.type==='value'?'var(--bb)':'var(--rb)';
  const typeBdr    = combo.type==='safe'?'var(--gb2)':combo.type==='value'?'var(--bb2)':'var(--rb2)';
  const riskColor  = combo.riskLabel==='낮음'?'var(--green)':combo.riskLabel==='보통'?'var(--amber)':'var(--red)';
  const probColor  = combo.comboProb>=30?'var(--green)':combo.comboProb>=15?'var(--blue)':combo.comboProb>=8?'var(--amber)':'var(--red)';
  const evColor    = combo.expectedReturn>=1?'var(--green)':'var(--red)';
  const valColor   = combo.value>=0?'var(--green)':'var(--red)';
  return `
  <div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rl);margin-bottom:12px;overflow:hidden">
    <div style="background:${typeBg};border-bottom:1px solid ${typeBdr};padding:12px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap">
      <div>
        <div style="font-family:var(--fh);font-size:16px;font-weight:800;color:${typeColor}">${combo.label} <span style="font-size:11px;font-weight:500;opacity:.7">#${combo.rank}</span></div>
        <div style="font-size:11px;color:var(--t3);margin-top:1px">${combo.desc}</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--fh);font-size:28px;font-weight:800;color:${probColor};line-height:1">${combo.comboProb}%</div>
        <div style="font-size:11px;color:var(--t3)">배당 ${combo.comboOdds}배</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-bottom:1px solid var(--bdr)">
      ${[
        ['평균 신뢰도', combo.avgConf+'%', combo.avgConf>=65?'var(--green)':'var(--amber)'],
        ['위험도', combo.riskLabel, riskColor],
        ['확실 경기', combo.certCount+'개', combo.certCount>0?'var(--green)':'var(--t3)'],
        ['기대수익(EV)', combo.expectedReturn.toFixed(2)+'x', evColor],
        ['Value', (combo.value>0?'+':'')+combo.value, valColor],
      ].map(([l,v,c])=>`<div style="padding:8px 10px;text-align:center;border-right:1px solid var(--bdr)">
        <div style="font-family:var(--fh);font-size:14px;font-weight:800;color:${c}">${v}</div>
        <div style="font-size:9px;color:var(--t3);margin-top:1px">${l}</div>
      </div>`).join('')}
    </div>
    <div style="padding:8px">${renderPickItems(combo.picks)}</div>
    <div style="padding:8px 12px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end">
      <button onclick="applyComboToMyCombo(${ci},'${gwStr}')" style="
        background:var(--purple);border:none;border-radius:8px;padding:6px 16px;
        font-size:11px;font-weight:700;color:#fff;cursor:pointer;font-family:var(--fb)">
        내 조합에 적용 →
      </button>
    </div>
  </div>`;
}

function selectAIGW(gw)        { selectedGW = gw; renderAIPick(); }
function selectComboType(type) { selectedComboType = type; renderAIPick(); }

function applyComboToMyCombo(comboIdx, gwStr) {
  const gwCombos = buildGWCombos();
  const gwData   = gwCombos.find(g=>g.gw===parseInt(gwStr));
  if(!gwData) return;
  const filtered = selectedComboType==='all' ? gwData.combos : gwData.combos.filter(c=>c.type===selectedComboType);
  const combo    = filtered[comboIdx];
  if(!combo) return;
  comboMatches = []; comboPicks = {};
  combo.picks.forEach(p => { comboMatches.push(p.fix.id); comboPicks[p.fix.id] = p.pick; });
  updateComboHint(); renderFixtures();
  switchTab('combo', document.querySelectorAll('.tab-btn')[2]);
}

function applyAIPickToCombo() {
  const gwCombos = buildGWCombos();
  if(!gwCombos.length) return;
  const target = gwCombos[0];
  const best   = target.bestCombo || target.combos[0];
  if(!best) return;
  comboMatches = []; comboPicks = {};
  best.picks.forEach(p => { comboMatches.push(p.fix.id); comboPicks[p.fix.id] = p.pick; });
  updateComboHint(); renderFixtures();
  switchTab('combo', document.querySelectorAll('.tab-btn')[2]);
}

// ══════════════════════════════════════════════════════
//  경기 결과 입력 + 예측 기록 자동 업데이트 + Elo 갱신
// ══════════════════════════════════════════════════════
function submitMatchResult(fixId, homeKey, awayKey, fixIdx) {
  const hInput = document.getElementById('score-h-'+fixId);
  const aInput = document.getElementById('score-a-'+fixId);
  if(!hInput || !aInput) return;
  const scoreH = parseInt(hInput.value);
  const scoreA = parseInt(aInput.value);
  if(isNaN(scoreH) || isNaN(scoreA) || scoreH<0 || scoreA<0) {
    alert('올바른 스코어를 입력하세요 (0 이상 숫자)'); return;
  }
  const result = scoreH>scoreA ? 'H' : scoreH<scoreA ? 'A' : 'D';

  // ① 내 예측 기록 업데이트
  const predIdx = myPredictions.findIndex(p=>p.fixId===fixId);
  if(predIdx >= 0) {
    const pred  = myPredictions[predIdx];
    const correct = pred.pick === result;
    myPredictions[predIdx] = {
      ...pred,
      outcome: correct ? 'correct' : 'wrong',
      scoreH, scoreA,
      actualResult: result,
    };
    savePredictions();
  }

  // ② 저장된 조합픽 업데이트
  myPredictions.forEach((p,i) => {
    if(p.picks && p.picks.find(pk=>pk.fixId===fixId)) {
      const allCorrect = p.picks.every(pk => {
        const fix = FIXTURES.find(f=>f.id===pk.fixId);
        if(!fix) return false;
        const storedPred = myPredictions.find(mp=>mp.fixId===pk.fixId);
        return storedPred?.outcome === 'correct';
      });
      myPredictions[i].outcome = allCorrect ? 'correct' : 'wrong';
    }
  });
  savePredictions();

  // ③ Elo 자동 업데이트
  if(result==='H')      _updateElo(homeKey, awayKey, false);
  else if(result==='A') _updateElo(awayKey, homeKey, false);
  else                  _updateElo(homeKey, awayKey, true);

  // ④ TEAM_STATS 홈/원정 성적 업데이트
  const hs = TEAM_STATS[homeKey], as2 = TEAM_STATS[awayKey];
  if(hs && as2) {
    if(result==='H') { hs.hW++; as2.aL++; }
    else if(result==='A') { hs.hL++; as2.aW++; }
    else { hs.hD++; as2.aD++; }
  }

  // ⑤ 폼 업데이트
  const hForm = TEAMS[homeKey]?.form;
  const aForm = TEAMS[awayKey]?.form;
  if(hForm) { hForm.unshift(result==='H'?'W':result==='D'?'D':'L'); hForm.length=5; }
  if(aForm) { aForm.unshift(result==='A'?'W':result==='D'?'D':'L'); aForm.length=5; }

  // ⑥ btCache 초기화 (데이터 변경됨)
  btCache = null;

  // UI 갱신
  updateRecBadge();
  renderFixtures();
  selectMatch(fixIdx);
  alert(`결과 저장 완료: ${TEAMS[homeKey].name} ${scoreH}-${scoreA} ${TEAMS[awayKey].name}\nElo·폼·기록 자동 갱신됨`);
}

//  모바일 UX — 스와이프로 탭 전환
// ════════════════════════════════════════════════════════
(function initSwipe(){
  const TAB_ORDER = ['fixtures','aipick','combo','record','standings','backtest'];
  let touchStartX = 0, touchStartY = 0;
  document.addEventListener('touchstart', e=>{
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive:true});
  document.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    // 수평 스와이프만 (기울기 비율 체크)
    if(Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx)*0.8) return;
    // 입력 필드에서는 스와이프 무시
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    const activeBtn = document.querySelector('.tab-btn.on');
    const activeTabId = activeBtn?.getAttribute('onclick')?.match(/switchTab\('(\w+)'/)?.[1];
    if(!activeTabId) return;
    const cur = TAB_ORDER.indexOf(activeTabId);
    if(cur < 0) return;
    let next = dx < 0 ? cur+1 : cur-1; // 왼쪽 스와이프=다음, 오른쪽=이전
    if(next < 0 || next >= TAB_ORDER.length) return;
    const nextId = TAB_ORDER[next];
    const nextBtn = [...document.querySelectorAll('.tab-btn')].find(b=>b.getAttribute('onclick')?.includes(nextId));
    switchTab(nextId, nextBtn);
    // 탭 버튼 스크롤
    nextBtn?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }, {passive:true});
})();

// 라운드로빈 전체 일정 생성 (38라운드 × 10경기 = 380경기)
function generateFullSchedule(){
  const tKeys = Object.keys(TEAMS);
  const n = tKeys.length; // 20
  const schedule = [];
  let rot = tKeys.slice(1);
  const fixed = tKeys[0];
  for(let r=0;r<n-1;r++){
    const round = [];
    round.push(r%2===0?[fixed,rot[0]]:[rot[0],fixed]);
    for(let i=1;i<n/2;i++) round.push(r%2===0?[rot[i],rot[n-1-i]]:[rot[n-1-i],rot[i]]);
    schedule.push(round);
    rot = [rot[rot.length-1],...rot.slice(0,rot.length-1)];
  }
  // 원정/홈 반전 시즌 후반
  const half1 = schedule.map(r=>r.map(m=>[m[0],m[1]]));
  for(let r=0;r<n-1;r++) schedule.push(half1[r].map(m=>[m[1],m[0]]));
  return schedule; // schedule[gw-1] = [{home,away}, ...]
}

// 팀 강도 (최종 순위 기반 0~1)
// 실제 결과 생성: 실제 시즌 W/D/L 기록에 최대한 수렴하는 결정론적 결과
// 각 팀의 '승-무-패 예산'을 소비하며 결과 생성
function buildActualResults(schedule){
  const budget = {};
  Object.entries(ACTUAL_RECORDS).forEach(([k,v])=>{budget[k]={w:v.w,d:v.d,l:v.l};});
  const results = [];
  schedule.forEach((round, gwIdx)=>{
    if(gwIdx>=31) return; // GW1~31만
    round.forEach((match, mIdx)=>{
      const [hk,ak] = match;
      const hb=budget[hk], ab=budget[ak];
      if(!hb||!ab) return;
      const seed = gwIdx*100+mIdx;
      // 각 팀 남은 예산 비율 기반으로 결과 결정
      const hWProb = hb.w/(hb.w+hb.d+hb.l+0.1);
      const hDProb = hb.d/(hb.w+hb.d+hb.l+0.1);
      const aWProb = ab.w/(ab.w+ab.d+ab.l+0.1);
      // 두 팀 선호 방향 합성
      const pHome  = (hWProb*0.6 + (1-aWProb)*0.4) * 1.08; // 홈 어드밴티지
      const pDraw  = (hDProb*0.5 + (ab.d/(ab.w+ab.d+ab.l+0.1))*0.5);
      const pAway  = Math.max(0.08, 1-pHome-pDraw);
      const total  = pHome+pDraw+pAway;
      const r = seededRnd(seed*3571+hk.charCodeAt(0)*13+ak.charCodeAt(0)*7);
      let res;
      if(r<pHome/total){ res='H'; hb.w=Math.max(0,hb.w-1); ab.l=Math.max(0,ab.l-1); }
      else if(r<(pHome+pDraw)/total){ res='D'; hb.d=Math.max(0,hb.d-1); ab.d=Math.max(0,ab.d-1); }
      else{ res='A'; hb.l=Math.max(0,hb.l-1); ab.w=Math.max(0,ab.w-1); }
      results.push({gw:gwIdx+1, home:hk, away:ak, result:res});
    });
  });
  return results;
}

// 특정 시점(gw 이전)까지의 팀 폼 계산
function getFormAtGW(teamKey, gw, history){
  const prev = history.filter(m=>(m.home===teamKey||m.away===teamKey)&&m.gw<gw);
  const last5 = prev.slice(-5);
  return last5.map(m=>{
    if(m.home===teamKey) return m.result==='H'?'W':m.result==='D'?'D':'L';
    return m.result==='A'?'W':m.result==='D'?'D':'L';
  });
}

// 특정 시점의 팀 축적 포인트
function getPtsAtGW(teamKey, gw, history){
  return history.filter(m=>(m.home===teamKey||m.away===teamKey)&&m.gw<gw)
    .reduce((pts,m)=>{
      if(m.home===teamKey) return pts+(m.result==='H'?3:m.result==='D'?1:0);
      return pts+(m.result==='A'?3:m.result==='D'?1:0);
    },0);
}

// GW별 팀 순위 추정

// 경기 시점의 AI 예측 (GW 누적 데이터 활용)
// ── GD 누적값 추정 (결과에서 역산) ──
function getGDAtGW(teamKey, gw, history){
  return history.filter(m=>(m.home===teamKey||m.away===teamKey)&&m.gw<gw)
    .reduce((gd,m)=>{
      // 결과별 평균 득실차 추정 (EPL 평균: 승=+1.8, 무=0, 패=-1.8)
      if(m.home===teamKey) return gd+(m.result==='H'?1.8:m.result==='D'?0:-1.8);
      return gd+(m.result==='A'?1.8:m.result==='D'?0:-1.8);
    },0);
}

function computeBacktest(){
  const sched = generateFullSchedule();
  const actual = buildActualResults(sched);
  const results = [];

  actual.forEach(m=>{
    const pred = predictAtGW(m.home, m.away, m.gw, results);
    const correct = pred.pred === m.result;
    results.push({...m, pred:pred.pred, conf:pred.conf, fH:pred.fH, fD:pred.fD, fA:pred.fA, correct});
  });

  // 집계
  const total = results.length;
  const correctTotal = results.filter(r=>r.correct).length;
  const accuracy = Math.round(correctTotal/total*100*10)/10;

  // 유형별
  const byType = {H:{n:0,c:0},D:{n:0,c:0},A:{n:0,c:0}};
  results.forEach(r=>{byType[r.pred].n++;if(r.correct)byType[r.pred].c++;});

  // 신뢰도 구간별
  const bands = [
    {label:'65% 이상 (확실)', min:65, max:100, n:0, c:0},
    {label:'55~64% (우세)',    min:55, max:64,  n:0, c:0},
    {label:'45~54% (근소)',    min:45, max:54,  n:0, c:0},
    {label:'35~44% (박빙)',    min:35, max:44,  n:0, c:0},
    {label:'34% 이하 (열세)',  min:0,  max:34,  n:0, c:0},
  ];
  results.forEach(r=>{
    const b=bands.find(b=>r.conf>=b.min&&r.conf<=b.max);
    if(b){b.n++;if(r.correct)b.c++;}
  });
  bands.forEach(b=>{ b.acc = b.n>0?Math.round(b.c/b.n*100*10)/10:0; });

  // 실제 당첨예측 vs 배당 예측 비교 (calibration)
  const calibBuckets = [
    {predMin:70,predMax:100,label:'예측 70%+'},
    {predMin:60,predMax:69, label:'예측 60-69%'},
    {predMin:50,predMax:59, label:'예측 50-59%'},
    {predMin:40,predMax:49, label:'예측 40-49%'},
    {predMin:30,predMax:39, label:'예측 30-39%'},
  ];
  calibBuckets.forEach(b=>{
    const matches=results.filter(r=>r.conf>=b.predMin&&r.conf<=b.predMax);
    b.n=matches.length;
    b.actual=matches.length>0?Math.round(matches.filter(r=>r.correct).length/matches.length*100*10)/10:0;
    b.predicted=Math.round((b.predMin+b.predMax)/2);
    b.diff=Math.round((b.actual-b.predicted)*10)/10;
  });

  // GW별 정확도
  const byGW = [];
  for(let gw=1;gw<=31;gw++){
    const gwR=results.filter(r=>r.gw===gw);
    const acc=gwR.length?Math.round(gwR.filter(r=>r.correct).length/gwR.length*100):0;
    byGW.push({gw,acc,n:gwR.length});
  }

  // 역배 감지 성능 (실제 이변 경기에서 역배 주의 뱃지를 달았는지)
  let upset=0,upsetsDetected=0,upsetsTotal=0;
  results.forEach(r=>{
    const favWon = (r.fH>r.fA&&r.fH>r.fD&&r.result==='H') ||
                   (r.fA>r.fH&&r.fA>r.fD&&r.result==='A');
    const isUpset = !favWon && r.conf>=55; // 강팀이 졌다
    if(isUpset){ upsetsTotal++; }
  });

  // 전반기(GW1-19) vs 후반기(GW20-31) 정확도
  const firstHalf  = results.filter(r=>r.gw<=19);
  const secondHalf = results.filter(r=>r.gw>=20);
  const accFirst  = firstHalf.length?Math.round(firstHalf.filter(r=>r.correct).length/firstHalf.length*100*10)/10:0;
  const accSecond = secondHalf.length?Math.round(secondHalf.filter(r=>r.correct).length/secondHalf.length*100*10)/10:0;

  // 보정 계수 계산 (calibration factor)
  const calibFactor = {};
  calibBuckets.forEach(b=>{
    calibFactor[b.predMin+'-'+b.predMax] = b.actual - b.predicted;
  });

  return {total,correctTotal,accuracy,byType,bands,calibBuckets,byGW,accFirst,accSecond,calibFactor,results};
}

// 보정 계수를 실제 예측에 적용
function applyCalibratedOdds(rawH, rawD, rawA){
  const buckets = [[70,100],[60,69],[50,59],[40,49],[30,39]];
  // 홈팀 확률에 보정 적용
  const bucket = buckets.find(b=>rawH>=b[0]&&rawH<=b[1]);
  if(bucket && btCache){
    const cb = btCache.calibBuckets.find(b=>b.predMin===bucket[0]);
    if(cb && Math.abs(cb.diff)<15){
      const adj = Math.round(cb.diff*0.5); // 절반만 적용 (과보정 방지)
      return {calH:Math.max(15,Math.min(78,rawH+adj)), calD:rawD, calA:Math.max(10,Math.min(52,rawA-adj))};
    }
  }
  return {calH:rawH, calD:rawD, calA:rawA};
}

          ['조건 11','캘리브레이션','자동','백테스트 오차 45% 반영 보정','var(--green)'],

}
